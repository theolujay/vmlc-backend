x-prod-security: &prod-security
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID
  security_opt:
    - no-new-privileges:true

x-prod-base: &prod-base
  image: ghcr.io/verboheit/vmlc-backend:prod
  volumes:
    - prod_media:/home/verboheit/web/media
    - prod_static:/home/verboheit/web/staticfiles
  env_file: prod.env
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - prod_backend
  dns:
    - 8.8.8.8
    - 8.8.4.4
  <<: *prod-security

services:
  watchtower:
    image: containrrr/watchtower
    container_name: prod_watchtower
    command:
      - "--label-enable"
      - "--internal"
      - "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  reverse-proxy:
    image: traefik:v3.5.3
    container_name: prod_reverse_proxy
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.websecure.address=:443"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=verboheitconsulting@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      
    ports:
      - "80:80"
      - "443:443"
      
    volumes:
      - prod_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
  db:
    image: postgres:17.2-bookworm
    container_name: prod_db
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=4MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=2MB
      -c min_wal_size=1GB
      -c max_wal_size=
    ports:
      - "5433:5432"
    env_file: prod.env
    volumes:
      - prod_db:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.7'
        reservations:
          memory: 512M
          cpus: '0.35'
    <<: *prod-security
    networks:
      - prod_backend

  redis:
    image: redis:7.2.4-alpine
    container_name: prod_redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 192mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --tcp-backlog 128
      --timeout 300
      --tcp-keepalive 60
    ports:
      - "6380:6379"
    volumes:
      - prod_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.2'
        reservations:
          memory: 96M
          cpus: '0.1'
    <<: *prod-security
    networks:
      - prod_backend

  web:
    <<: *prod-base
    command: ["./scripts/runserver.sh"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host('api.verboheit.org')"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=myresolver"
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 5 --silent --show-error || exit 1"]
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.6'
        reservations:
          memory: 384M
          cpus: '0.3'

  celery_worker:
    <<: *prod-base
    container_name: prod_celery_worker
    command: ["celery", "-A", "config", "worker", "-l", "warning", "--concurrency=2", "--max-tasks-per-child=1000", "--time-limit=300", "-Q", "default,emails,comms,scoring,files,reports,cache"]
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping", "-d", "celery@%h"]
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.6'
        reservations:
          memory: 384M
          cpus: '0.3'

  celery_beat:
    <<: *prod-base
    container_name: prod_celery_beat
    command: ["celery", "-A", "config", "beat", "-l", "warning", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'

  flower:
    <<: *prod-base
    container_name: prod_flower
    command: ["celery", "-A", "config", "flower", "--address=0.0.0.0", "--port=5555", "--max-tasks=1000"]
    depends_on:
      celery_worker:
        condition: service_started
    ports:
      - "5556:5555"
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.2'
        reservations:
          memory: 96M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/workers", "--max-time", "5"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  prod_letsencrypt:
  prod_db:
  prod_redis:
  prod_media:
  prod_static:
  
networks:
  prod_backend:
    driver: bridge
  prod_frontend:
    driver: bridge

secrets:
  AWS_ACCESS_KEY_ID:
    file: ./secrets/prod/AWS_ACCESS_KEY_ID.txt
  AWS_S3_REGION_NAME:
    file: ./secrets/prod/AWS_S3_REGION_NAME.txt
  AWS_SECRET_ACCESS_KEY:
    file: ./secrets/prod/AWS_SECRET_ACCESS_KEY.txt
  AWS_STORAGE_BUCKET_NAME:
    file: ./secrets/prod/AWS_STORAGE_BUCKET_NAME.txt
  DATABASE_URL:
    file: ./secrets/prod/DATABASE_URL.txt
  EMAIL_HOST_PASSWORD:
    file: ./secrets/prod/EMAIL_HOST_PASSWORD.txt
  EMAIL_HOST_USER:
    file: ./secrets/prod/EMAIL_HOST_USER.txt
  POSTGRES_DB:
    file: ./secrets/prod/POSTGRES_DB.txt
  POSTGRES_PASSWORD:
    file: ./secrets/prod/POSTGRES_PASSWORD.txt
  POSTGRES_USER:
    file: ./secrets/prod/POSTGRES_USER.txt
  SECRET_KEY:
    file: ./secrets/prod/SECRET_KEY.txt
  SUPERUSER_EMAIL:
    file: ./secrets/prod/SUPERUSER_EMAIL.txt
  SUPERUSER_PASSWORD:
    file: ./secrets/prod/SUPERUSER_PASSWORD.txt
