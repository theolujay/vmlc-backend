include:
  - compose.observability.yml

x-prod-base: &prod-base
  image: ghcr.io/verboheit/vmlc-backend:prod
  volumes:
    - prod_media:/home/verboheit/web/media
    - prod_static:/home/verboheit/web/staticfiles
  env_file: prod.env
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - prod
  dns:
    - 8.8.8.8
    - 8.8.4.4

x-prod-otel-env: &prod-otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_SERVICE_NAME: ${COMPOSE_PROJECT_NAME}_prod
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=production
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.05"  # Sample 5% of traces in prod (lower overhead)

services:
  watchtower:
    image: containrrr/watchtower
    container_name: prod_watchtower
    command:
      - "--label-enable"
      - "--interval"
      - "30"
      - "--rolling-restart"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ~/.docker/config.json:/config.json:ro
    environment:
      - DOCKER_CONFIG=/
    networks:
      - prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.05'

  traefik:
    image: traefik:v3.5.3
    container_name: prod_traefik
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=prod"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=verboheitconsulting@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=false"
      - "--metrics.otlp=true"
      - "--metrics.otlp.http=true"
      - "--metrics.otlp.grpc=false"
      - "--metrics.otlp.http.endpoint=http://otel-collector:4318/v1/metrics"
      - "--metrics.otlp.serviceName=traefik"
      - "--metrics.otlp.addEntryPointsLabels=true"
      - "--metrics.otlp.addRoutersLabels=true"
      - "--metrics.otlp.addServicesLabels=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - prod_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.verboheit.org`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=le"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth@docker"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=theolujay:$apr1$yvdwosdp$3/QCmJs6D7LUmDlCKjUTu/"
    networks:
      - prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  db:
    image: postgres:17.2-bookworm
    container_name: prod_db
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.max=5000
      -c pg_stat_statements.track=top
      -c log_min_duration_statement=3000
      -c max_connections=30
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c maintenance_work_mem=32MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=4MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=2MB
      -c min_wal_size=512MB
      -c max_wal_size=2GB
    env_file: prod.env
    volumes:
      - prod_db:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.4'
        reservations:
          memory: 256M
          cpus: '0.2'
    networks:
      - prod

  redis:
    image: redis:7.2.4-alpine
    container_name: prod_redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy noeviction
      --tcp-backlog 128
      --timeout 300
      --tcp-keepalive 60
      --loglevel warning
    volumes:
      - prod_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.15'
        reservations:
          memory: 64M
          cpus: '0.075'
    networks:
      - prod

  web:
    <<: *prod-base
    command: >
      opentelemetry-instrument
      --traces_exporter otlp
      --metrics_exporter otlp
      ./scripts/runserver.sh
    environment:
      <<: *prod-otel-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-http.rule=Host(`api.verboheit.org`)"
      - "traefik.http.routers.web-http.entrypoints=web"
      - "traefik.http.routers.web-http.middlewares=redirect-to-https"
      - "traefik.http.routers.web.rule=Host(`api.verboheit.org`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=le"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.services.web.loadbalancer.server.port=8000"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 5 --silent --show-error || exit 1"]
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      mode: replicated
      replicas: 4
      resources:
        limits:
          memory: 640M
          cpus: '0.6'
        reservations:
          memory: 320M
          cpus: '0.3'

  celery_worker:
    <<: *prod-base
    container_name: prod_celery_worker
    command: >
      opentelemetry-instrument
      --traces_exporter otlp
      --metrics_exporter otlp
      celery -A config worker -l warning --concurrency=2 --max-tasks-per-child=500 --time-limit=300 -Q default,emails,comms,scoring,files,reports,cache
    environment:
      <<: *prod-otel-env
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.4'
        reservations:
          memory: 256M
          cpus: '0.2'

  celery_beat:
    <<: *prod-base
    container_name: prod_celery_beat
    command: ["celery", "-A", "config", "beat", "-l", "warning", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.15'
        reservations:
          memory: 96M
          cpus: '0.075'

volumes:
  prod_letsencrypt:
  prod_db:
  prod_redis:
  prod_media:
  prod_static:
  
networks:
  prod:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_prod

secrets:
  AWS_ACCESS_KEY_ID:
    file: ./secrets/prod/AWS_ACCESS_KEY_ID.txt
  AWS_S3_REGION_NAME:
    file: ./secrets/prod/AWS_S3_REGION_NAME.txt
  AWS_SECRET_ACCESS_KEY:
    file: ./secrets/prod/AWS_SECRET_ACCESS_KEY.txt
  AWS_STORAGE_BUCKET_NAME:
    file: ./secrets/prod/AWS_STORAGE_BUCKET_NAME.txt
  DATABASE_URL:
    file: ./secrets/prod/DATABASE_URL.txt
  EMAIL_HOST_PASSWORD:
    file: ./secrets/prod/EMAIL_HOST_PASSWORD.txt
  EMAIL_HOST_USER:
    file: ./secrets/prod/EMAIL_HOST_USER.txt
  POSTGRES_DB:
    file: ./secrets/prod/POSTGRES_DB.txt
  POSTGRES_PASSWORD:
    file: ./secrets/prod/POSTGRES_PASSWORD.txt
  POSTGRES_USER:
    file: ./secrets/prod/POSTGRES_USER.txt
  SECRET_KEY:
    file: ./secrets/prod/SECRET_KEY.txt
  SUPERUSER_EMAIL:
    file: ./secrets/prod/SUPERUSER_EMAIL.txt
  SUPERUSER_PASSWORD:
    file: ./secrets/prod/SUPERUSER_PASSWORD.txt