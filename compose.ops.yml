services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./otel.yml:/etc/otel/config.yml:ro
    ports:
      - "4318:4318"
    networks:
      - staging
    restart: unless-stopped
    depends_on:
      - loki
      - prometheus
      - tempo
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.1'

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--enable-feature=exemplar-storage'
      - '--enable-feature=native-histograms'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - staging_prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.1'

  loki:
    image: grafana/loki:latest
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml
      - staging_loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.1'

  tempo:
    image: grafana/tempo:latest
    volumes:
      - ./tempo.yml:/etc/tempo/tempo-local.yaml:ro
      - staging_tempo:/tmp/tempo
    command: ["-config.file=/etc/tempo/tempo-local.yaml"]
    ports:
      - "3200:3200"
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.1'

  grafana:
    image: grafana/grafana:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`staging-ops.verboheit.org`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    environment:
      - GF_SERVER_ROOT_URL=https://staging-ops.verboheit.org
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
      - GF_PLUGINS_DISABLE_INSTALLATION=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_UPDATE_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - staging_grafana:/etc/grafana/provisioning/datasources
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'

volumes:
  staging_loki:
  staging_tempo:
  staging_grafana:
  staging_prometheus:

networks:
  staging:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_staging
