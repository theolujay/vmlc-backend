# previews:
#   generation: automatic

envVarGroups:
  - name: vmlc-secrets

databases:
  - name: vmlc-db
    databaseName: private
    ipAllowList: []
    plan: free

services:
  - name: vmlc-backend
    type: web
    runtime: image
    image:
      url: docker.io/theolujay/vmlc-backend:0.3.1
      creds:
        fromRegistryCreds:
          name: vmlc-creds
    plan: free
    region: frankfurt
    healthCheckPath: /v1/health/
    envVars:
      - fromGroup: vmlc-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: vmlc-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vmlc-redis
          property: connectionString

