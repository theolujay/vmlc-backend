  # Flower Dashboard
  - type: web
    name: vmlc-flower
    region: frankfurt
    runtime: image
    image:
      url: docker.io/theolujay/vmlc-backend:0.3.1
      creds:
        fromRegistryCreds:
          name: vmlc-creds
    plan: free
    dockerCommand: "celery -A config flower --address=0.0.0.0 --port=5555 --basic-auth=${SUPERUSER_EMAIL}:${SUPERUSER_PASSWORD}"
    envVars:
      - fromGroup: vmlc-secrets

  - type: keyvalue
    name: vmlc-redis
    ipAllowList: []
    plan: free