# Development-specific overrides (auto-loaded)
services:
  web:
    build:
      target: development  # Use development build with tools
    ports:
      - "8000:8000"
    volumes:
      - .:/home/app/web  # Mount source code for hot reloading
      - /home/app/web/__pycache__  # Exclude Python cache
      - /home/app/web/.pytest_cache  # Exclude pytest cache
      - dev_logs:/home/app/web/logs
    env_file:
      - ./.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.docker_dev
      - DEBUG=True
      - PYTHONDEBUG=1
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    # Simpler health check for development
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)"]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 30s
    # Remove resource limits for development
    deploy: {}
    restart: "no"  # Don't auto-restart in development

  db:
    ports:
      - "5432:5432"  # Expose for pgAdmin, DBeaver, etc.
    env_file:
      - ./.env
    # Verbose logging for development
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.max=10000
      -c pg_stat_statements.track=all
      -c log_statement=all
      -c log_duration=true
      -c log_min_duration_statement=0
    restart: "no"

  redis:
    ports:
      - "6379:6379"  # Expose for Redis CLI, GUI tools
    command: ["redis-server", "--appendonly", "yes"]
    restart: "no"

  celery_worker:
    build:
      target: development
    volumes:
      - .:/home/app/web
      - dev_logs:/home/app/web/logs
    env_file:
      - ./.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.docker_dev
      - DEBUG=True
      - C_FORCE_ROOT=1
    command: ["celery", "-A", "config", "worker", "-l", "debug", "--events", "--pool=solo"]
    deploy: {}  # Remove resource limits
    restart: "no"

  flower:
    build:
      target: development
    ports:
      - "5555:5555"
    volumes:
      - .:/home/app/web
    env_file:
      - ./.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.docker_dev
    restart: "no"

# Development-specific volumes
volumes:
  dev_logs: