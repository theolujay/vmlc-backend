# Staging environment overrides
# Deploy: docker stack deploy -c stack.base.yml -c stack.staging.yml vmlc-staging

x-vmlc-staging-env: &vmlc-staging-env
  DEBUG: "false"
  OTEL_SERVICE_NAME: ${COMPOSE_PROJECT_NAME}_staging
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=staging
  ALLOWED_HOSTS: staging-api.verboheit.org,localhost
  AWS_STORAGE_BUCKET_NAME: vmlc-staging
  CORS_ALLOWED_ORIGINS: https://staging-portal.verboheit.org,https://staging.verboheit.org
  CORS_ALLOW_ALL_ORIGINS: "true"
  DEFAULT_FROM_EMAIL: "Verboheit MLC <staging-mlc@verboheit.org>"
  DJANGO_SETTINGS_MODULE: config.settings.staging
  FRONTEND_BASE_URL: "https://staging-portal.verboheit.org"
  LANDING_BASE_URL: "https://staging.verboheit.org"
  GUNICORN_WORKERS: "1"

x-vmlc-staging: &vmlc-staging
  image: ghcr.io/verboheit/vmlc-backend:${GIT_COMMIT_HASH:-staging}

services:
  traefik:
    volumes:
      - "staging_letsencrypt:/letsencrypt"
    environment:
      TRAEFIK_PROVIDERS_DOCKER_NETWORK: staging
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'

  db:
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=top
      -c effective_io_concurrency=200
      -c random_page_cost=1.1
      -c pg_stat_statements.max=5000
      -c log_min_duration_statement=5000
      -c max_connections=50
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=5MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=8MB
    environment:
      - POSTGRES_DB=vmlc_staging
      - POSTGRES_USER=verboheit_staging
    volumes:
      - staging_db:/var/lib/postgresql/data
      - /home/verboheit/.db_backups:/backups
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  redis:
    networks:
      - staging
    volumes:
      - staging_redis:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 192M
          cpus: '0.1'

  db-migrate:
    <<:
      - *vmlc-staging
    user: root
    environment: *vmlc-staging-env
    volumes:
      - staging_media:/app/media
      - staging_static:/app/staticfiles
    networks:
      - staging
    deploy:
      mode: replicated-job
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
        window: 300s
      resources:
        limits:
          memory: 384M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.15'

  django:
    <<:
      - *vmlc-staging
    environment: *vmlc-staging-env
    volumes:
      - staging_media:/app/media
      - staging_static:/app/staticfiles
    labels:
      - "traefik.http.routers.django.rule=Host(`staging-api.verboheit.org`)"
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.3'

  celery_worker:
    <<:
      - *vmlc-staging
    environment: *vmlc-staging-env
    volumes:
      - staging_media:/app/media
      - staging_static:/app/staticfiles
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.4'
        reservations:
          memory: 512M
          cpus: '0.2'

  celery_beat:
    <<:
      - *vmlc-staging
    environment: *vmlc-staging-env
    volumes:
      - staging_media:/app/media
      - staging_static:/app/staticfiles
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'
        reservations:
          memory: 128M
          cpus: '0.05'

  alloy:
    volumes:
      - "staging_alloy:/var/lib/alloy/data"
    labels:
      - "traefik.http.routers.alloy.rule=Host(`staging-ops.verboheit.org`) && PathPrefix(`/alloy`)"
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.3'
        reservations:
          memory: 256M
          cpus: '0.15'

  prometheus:
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=8GB'
      - '--enable-feature=exemplar-storage'
      - '--enable-feature=native-histograms'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - "staging_prometheus:/prometheus"
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 384M
          cpus: '0.15'

  loki:
    volumes:
      - "staging_loki:/loki"
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'

  tempo:
    volumes:
      - "staging_tempo:/tmp/tempo"
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.2'
        reservations:
          memory: 384M
          cpus: '0.1'

  grafana:
    environment:
      GF_SERVER_ROOT_URL: https://staging-ops.verboheit.org
      GF_SMTP_FROM_ADDRESS: verboheitmlc@gmail.com
    volumes:
      - "staging_grafana:/var/lib/grafana"
    labels:
      - "traefik.http.routers.grafana.rule=Host(`staging-ops.verboheit.org`)"
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 192M
          cpus: '0.1'

networks:
  staging:
    external: true
    
volumes:
  staging_db:
  staging_redis:
  staging_media:
  staging_static:
  staging_alloy:
  staging_loki:
  staging_tempo:
  staging_grafana:
  staging_prometheus:
  staging_letsencrypt: