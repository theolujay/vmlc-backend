x-staging-security: &staging-security
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID
  security_opt:
    - no-new-privileges:true

x-vmlc-common: &vmlc-common
  volumes:
    - staging_media:/home/verboheit/web/media
    - staging_static:/home/verboheit/web/staticfiles
  env_file: staging.env
  networks:
    - staging
  dns:
    - 8.8.8.8
    - 8.8.4.4
  <<: *staging-security

x-staging-otel-env: &staging-otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_SERVICE_NAME: ${COMPOSE_PROJECT_NAME}_staging
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=staging
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.01"  # Sample 10% of traces to reduce overhead

services:
  traefik:
    image: traefik:v3.5.3
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${COMPOSE_PROJECT_NAME}_staging"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=verboheitconsulting@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.caserver=https://acme-v02.api.letsencrypt.org/directory"
      - "--metrics.prometheus=false"
      - "--metrics.otlp=true"
      - "--metrics.otlp.http=true"
      - "--metrics.otlp.grpc=false"
      - "--metrics.otlp.http.endpoint=http://otel-collector:4318/v1/metrics"
      - "--metrics.otlp.serviceName=traefik"
      - "--metrics.otlp.addEntryPointsLabels=true"
      - "--metrics.otlp.addRoutersLabels=true"
      - "--metrics.otlp.addServicesLabels=true"
      - "--tracing=true"
      - "--tracing.serviceName=traefik"
      - "--tracing.sampleRate=0.05"
      - "--tracing.otlp.grpc=false"
      - "--tracing.otlp.http=true"
      - "--tracing.otlp.http.endpoint=http://otel-collector:4318/v1/traces"
      - "--log.level=INFO"
      - "--log.format=json"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - staging_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 50M
          cpus: '0.05'
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:17.2-bookworm
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.max=5000
      -c pg_stat_statements.track=top
      -c log_min_duration_statement=5000
      -c max_connections=30
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=4MB
    env_file: staging.env
    volumes:
      - staging_db:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.15'
    networks:
      - staging

  redis:
    image: redis:7.2.4-alpine
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
      --tcp-backlog 64
      --timeout 300
      --save 900 1
      --save 300 10
    volumes:
      - staging_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: '0.1'
        reservations:
          memory: 48M
          cpus: '0.05'
    networks:
      - staging

  db-migrate:
    <<: *vmlc-common
    image: &vmlcImage ghcr.io/verboheit/vmlc-backend:staging
    pull_policy: always
    entrypoint: ""
    command: ["./scripts/runmigrations.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: "no"
    deploy:
      mode: replicated-job
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

  django:
    <<: *vmlc-common
    image: *vmlcImage
    entrypoint: ./scripts/entrypoint.sh
    command:
      - opentelemetry-instrument
      - --traces_exporter
      - otlp
      - --metrics_exporter
      - otlp
      - --logs_exporter
      - otlp
      - ./scripts/runserver.sh
    environment:
      <<: *staging-otel-env
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=staging,service.instance.id=django
    depends_on:
      db-migrate:
        condition: service_completed_successfully
        restart: true
      otel-collector:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.rule=Host(`staging-api.verboheit.org`)"
      - "traefik.http.routers.django.entrypoints=websecure"
      - "traefik.http.routers.django.tls.certresolver=le"
      - "traefik.http.routers.django.tls=true"
      - "traefik.http.services.django.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 5 --silent --show-error || exit 1"]
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.2'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  celery_worker:
    <<: *vmlc-common
    image: *vmlcImage
    entrypoint: ./scripts/entrypoint.sh
    command:
      - opentelemetry-instrument
      - --traces_exporter
      - otlp
      - --metrics_exporter
      - otlp
      - --logs_exporter
      - otlp
      - celery
      - -A
      - config
      - worker
      - -l
      - warning
      - --concurrency=2
      - --max-tasks-per-child=100
      - --time-limit=300
      - -Q
      - default,emails,comms,scoring,files,reports,cache
    environment:
      <<: *staging-otel-env
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=staging,service.instance.id=celery_worker
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
        restart: true
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 120s
      timeout: 20s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.15'
        reservations:
          memory: 256M
          cpus: '0.075'

  celery_beat:
    <<: *vmlc-common
    image: *vmlcImage
    entrypoint: ./scripts/entrypoint.sh
    command: ["celery", "-A", "config", "beat", "-l", "warning", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    depends_on:
      db-migrate:
        condition: service_completed_successfully
        restart: true
      otel-collector:
        condition: service_started
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.05'
        reservations:
          memory: 50M
          cpus: '0.03'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./otel.yml:/etc/otel/config.yml:ro
    ports:
      - "4318:4318"
    networks:
      - staging
    restart: unless-stopped
    # depends_on:
    #   - loki
    #   - prometheus
    #   - tempo
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--enable-feature=exemplar-storage'
      - '--enable-feature=native-histograms'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - staging_prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.1'

  loki:
    image: grafana/loki:latest
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml
      - staging_loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  tempo:
    image: grafana/tempo:latest
    volumes:
      - ./tempo.yml:/etc/tempo/tempo-local.yaml:ro
      - staging_tempo:/tmp/tempo
    command: ["-config.file=/etc/tempo/tempo-local.yaml"]
    ports:
      - "3200:3200"
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.1'

  grafana:
    image: grafana/grafana:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`staging-ops.verboheit.org`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    environment:
      - GF_SERVER_ROOT_URL=https://staging-ops.verboheit.org
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
      - GF_PLUGINS_DISABLE_INSTALLATION=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_UPDATE_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - staging_grafana:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

networks:
  staging:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_staging

volumes:
  staging_db:
  staging_redis:
  staging_media:
  staging_static:
  staging_loki:
  staging_tempo:
  staging_grafana:
  staging_prometheus:
  staging_letsencrypt:

secrets:
  AWS_ACCESS_KEY_ID:
    file: ./secrets/staging/AWS_ACCESS_KEY_ID.txt
  AWS_S3_REGION_NAME:
    file: ./secrets/staging/AWS_S3_REGION_NAME.txt
  AWS_SECRET_ACCESS_KEY:
    file: ./secrets/staging/AWS_SECRET_ACCESS_KEY.txt
  AWS_STORAGE_BUCKET_NAME:
    file: ./secrets/staging/AWS_STORAGE_BUCKET_NAME.txt
  DATABASE_URL:
    file: ./secrets/staging/DATABASE_URL.txt
  EMAIL_HOST_PASSWORD:
    file: ./secrets/staging/EMAIL_HOST_PASSWORD.txt
  EMAIL_HOST_USER:
    file: ./secrets/staging/EMAIL_HOST_USER.txt
  POSTGRES_DB:
    file: ./secrets/staging/POSTGRES_DB.txt
  POSTGRES_PASSWORD:
    file: ./secrets/staging/POSTGRES_PASSWORD.txt
  POSTGRES_USER:
    file: ./secrets/staging/POSTGRES_USER.txt
  SECRET_KEY:
    file: ./secrets/staging/SECRET_KEY.txt
  SUPERUSER_EMAIL:
    file: ./secrets/staging/SUPERUSER_EMAIL.txt
  SUPERUSER_PASSWORD:
    file: ./secrets/staging/SUPERUSER_PASSWORD.txt
