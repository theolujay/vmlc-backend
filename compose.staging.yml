include:
  - compose.observability.yml

x-staging-base: &staging-base
  image: ghcr.io/verboheit/vmlc-backend:staging
  volumes:
    - staging_media:/home/verboheit/web/media
    - staging_static:/home/verboheit/web/staticfiles
  env_file: staging.env
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - staging
  dns:
    - 8.8.8.8
    - 8.8.4.4

x-staging-otel-env: &staging-otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_SERVICE_NAME: ${COMPOSE_PROJECT_NAME}_staging
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=staging
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"  # Sample 10% of traces to reduce overhead

services:
  watchtower:
    image: containrrr/watchtower
    container_name: staging_watchtower
    command:
      - "--label-enable"
      - "--interval"
      - "30"
      - "--rolling-restart"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ~/.docker/config.json:/config.json:ro
    environment:
      - DOCKER_CONFIG=/
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 50M
          cpus: '0.05'
        reservations:
          memory: 25M
          cpus: '0.02'

  traefik:
    image: traefik:v3.5.3
    container_name: staging_traefik
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=vmlc-backend_staging"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=verboheitconsulting@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--metrics.prometheus=false"
      - "--metrics.otlp=true"
      - "--metrics.otlp.http=true"
      - "--metrics.otlp.grpc=false"
      - "--metrics.otlp.http.endpoint=http://otel-collector:4318/v1/metrics"
      - "--metrics.otlp.serviceName=traefik"
      - "--metrics.otlp.addEntryPointsLabels=true"
      - "--metrics.otlp.addRoutersLabels=true"
      - "--metrics.otlp.addServicesLabels=true"
      - "--tracing=true"
      - "--tracing.serviceName=traefik"
      - "--tracing.sampleRate=0.05"
      - "--tracing.otlp.grpc=false"
      - "--tracing.otlp.http=true"
      - "--tracing.otlp.http.endpoint=http://otel-collector:4318/v1/metrics"
      - "--log.level=INFO"
      - "--log.format=json"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - staging_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`staging-api.verboheit.org`) && (PathPrefix(`/traefik`))"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=le"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=theolujay:$$apr1$$yvdwosdp$$3/QCmJs6D7LUmDlCKjUTu/"
    networks:
      - staging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 100M
          cpus: '0.15'
        reservations:
          memory: 50M
          cpus: '0.05'

  db:
    image: postgres:17.2-bookworm
    container_name: staging_db
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.max=5000
      -c pg_stat_statements.track=top
      -c log_min_duration_statement=5000
      -c max_connections=30
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c effective_io_concurrency=200
      -c wal_buffers=4MB
    env_file: staging.env
    volumes:
      - staging_db:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.4'
        reservations:
          memory: 256MB
          cpus: '0.2'
    networks:
      - staging

  redis:
    image: redis:7.2.4-alpine
    container_name: staging_redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
      --tcp-backlog 64
      --timeout 300
      --save ""
    volumes:
      - staging_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 150M
          cpus: '0.15'
        reservations:
          memory: 75M
          cpus: '0.05'
    networks:
      - staging

  web:
    <<: *staging-base
    command: >
      opentelemetry-instrument
      --traces_exporter otlp
      --metrics_exporter otlp
      ./scripts/runserver.sh
    environment:
      <<: *staging-otel-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-http.rule=Host(`staging-api.verboheit.org`)"
      - "traefik.http.routers.web-http.entrypoints=web"
      - "traefik.http.routers.web-http.middlewares=redirect-to-https"
      - "traefik.http.routers.web.rule=Host(`staging-api.verboheit.org`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=le"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.services.web.loadbalancer.server.port=8000"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 5 --silent --show-error || exit 1"]
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  celery_worker:
    <<: *staging-base
    container_name: staging_celery_worker
    command: >
      opentelemetry-instrument
      --traces_exporter otlp
      --metrics_exporter otlp
      celery -A config worker -l warning --concurrency=1 --max-tasks-per-child=100 --time-limit=300 -Q default,emails,comms,scoring,files,reports,cache
    environment:
      <<: *staging-otel-env
    healthcheck:
      test: ["CMD", "sh", "-c", "OTEL_SDK_DISABLED=true celery -A config inspect ping"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.3'
        reservations:
          memory: 192M
          cpus: '0.15'

  celery_beat:
    <<: *staging-base
    container_name: staging_celery_beat
    command: ["celery", "-A", "config", "beat", "-l", "warning", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    deploy:
      resources:
        limits:
          memory: 100M
          cpus: '0.1'
        reservations:
          memory: 50M
          cpus: '0.05'

volumes:
  staging_letsencrypt:
  staging_db:
  staging_redis:
  staging_media:
  staging_static:

networks:
  staging:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_staging

secrets:
  AWS_ACCESS_KEY_ID:
    file: ./secrets/staging/AWS_ACCESS_KEY_ID.txt
  AWS_S3_REGION_NAME:
    file: ./secrets/staging/AWS_S3_REGION_NAME.txt
  AWS_SECRET_ACCESS_KEY:
    file: ./secrets/staging/AWS_SECRET_ACCESS_KEY.txt
  AWS_STORAGE_BUCKET_NAME:
    file: ./secrets/staging/AWS_STORAGE_BUCKET_NAME.txt
  DATABASE_URL:
    file: ./secrets/staging/DATABASE_URL.txt
  EMAIL_HOST_PASSWORD:
    file: ./secrets/staging/EMAIL_HOST_PASSWORD.txt
  EMAIL_HOST_USER:
    file: ./secrets/staging/EMAIL_HOST_USER.txt
  POSTGRES_DB:
    file: ./secrets/staging/POSTGRES_DB.txt
  POSTGRES_PASSWORD:
    file: ./secrets/staging/POSTGRES_PASSWORD.txt
  POSTGRES_USER:
    file: ./secrets/staging/POSTGRES_USER.txt
  SECRET_KEY:
    file: ./secrets/staging/SECRET_KEY.txt
  SUPERUSER_EMAIL:
    file: ./secrets/staging/SUPERUSER_EMAIL.txt
  SUPERUSER_PASSWORD:
    file: ./secrets/staging/SUPERUSER_PASSWORD.txt