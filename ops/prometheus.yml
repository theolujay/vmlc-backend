global:
  scrape_interval: 60s
  evaluation_interval: 60s
  scrape_timeout: 10s
  external_labels:
    cluster: 'vmlc-backend'
    environment: 'staging'

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:9464']
        labels:
          environment: 'staging'
    
    metric_relabel_configs:  # drop unused metrics to save space
      - source_labels: [__name__]
        regex: 'go_.*'  # Drop Go runtime metrics
        action: drop

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']