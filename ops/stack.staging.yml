x-staging-security: &staging-security
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID
  
x-staging-otel-env: &staging-otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_SERVICE_NAME: ${COMPOSE_PROJECT_NAME}_staging
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=staging
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.01"
  OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
  OTEL_LOGS_EXPORTER: otlp

x-vmlc-env: &vmlc-env
  AWS_ACCESS_KEY_ID_FILE: /run/secrets/aws-access-key-id
  AWS_SECRET_ACCESS_KEY_FILE: /run/secrets/aws-secret-access-key
  DATABASE_URL_FILE: /run/secrets/database-url
  DJANGO_ADMIN_URL_FILE: /run/secrets/django-admin-url
  EMAIL_HOST_USER_FILE: /run/secrets/gmail-host-user
  EMAIL_HOST_PASSWORD_FILE: /run/secrets/gmail-host-password
  SECRET_KEY_FILE: /run/secrets/django-secret-key
  SUPERUSER_PASSWORD_FILE: /run/secrets/su-password
  ALLOWED_HOSTS: api.verboheit.org,staging-api.verboheit.org,localhost
  AWS_S3_REGION_NAME: eu-central-1
  AWS_STORAGE_BUCKET_NAME: vmlc-staging
  CACHE_REDIS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  CORS_ALLOWED_ORIGINS: https://staging-portal.verboheit.org
  CORS_ALLOW_ALL_ORIGINS: "true"
  CORS_ALLOW_CREDENTIALS: "true"
  DEBUG: "false"
  DEFAULT_FROM_EMAIL: "Verboheit MLC <staging-mlc@verboheit.org>"
  DJANGO_SETTINGS_MODULE: config.settings.staging
  EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
  EMAIL_HOST: smtp.gmail.com
  EMAIL_PORT: 587
  EMAIL_USE_TLS: "true"
  INTERNAL_IPS: 127.0.0.1,0.0.0.0,localhost
  REDIS_URL: redis://redis:6379/0
  POSTGRES_DB: vmlc_staging
  POSTGRES_USER: verboheit_staging
  SUPERUSER_EMAIL_FILE: /run/secrets/su-email
  # TWILIO_ACCOUNT_SID: /run/secrets/twilio-account-sid
  # TWILIO_AUTH_TOKEN: /run/secrets/twilio-auth-token
  # TWILIO_FROM_PHONE: /run/secrets/twilio-from-phone

x-vmlc-common: &vmlc-common
  image: ghcr.io/verboheit/vmlc-backend:${GIT_COMMIT_HASH:-staging}
  volumes:
    - media:/home/verboheit/web/media
    - static:/home/verboheit/web/staticfiles
  secrets:
    - aws-access-key-id
    - aws-secret-access-key
    - database-url
    - django-admin-url
    - gmail-host-user
    - gmail-host-password
    - django-secret-key
    - su-email
    - su-password
    # - twilio-account-sid
    # - twilio-auth-token
    # - twilio-from-phone
  labels:
    - "traefik.enable=true"
  networks:
    - staging
  dns:
    - 8.8.8.8
    - 8.8.4.4
  <<: *staging-security


services:
# ======================================================
# Infrastructure
# ======================================================
  traefik:
    image: traefik:v3.5.3
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=staging"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=verboheitconsulting@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.caserver=https://acme-v02.api.letsencrypt.org/directory"
      - "--metrics.prometheus=false"
      - "--metrics.otlp=true"
      - "--metrics.otlp.http=true"
      - "--metrics.otlp.grpc=false"
      - "--metrics.otlp.http.endpoint=http://alloy:4318/v1/metrics"
      - "--metrics.otlp.serviceName=traefik"
      - "--metrics.otlp.addEntryPointsLabels=true"
      - "--metrics.otlp.addRoutersLabels=true"
      - "--metrics.otlp.addServicesLabels=true"
      - "--tracing=true"
      - "--tracing.serviceName=traefik"
      - "--tracing.sampleRate=0.05"
      - "--tracing.otlp.grpc=false"
      - "--tracing.otlp.http=true"
      - "--tracing.otlp.http.endpoint=http://alloy:4318/v1/traces"
      - "--log.level=INFO"
      - "--log.format=json"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'

  db:
    image: postgres:17.2-bookworm
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.max=5000
      -c pg_stat_statements.track=top
      -c log_min_duration_statement=5000
      -c max_connections=50
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=5MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=8MB
    secrets:
      - db-password
    environment:
      - POSTGRES_DB=vmlc_staging
      - POSTGRES_USER=verboheit_staging
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    networks:
      - staging

  redis:
    image: redis:7.2.4-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
      --tcp-backlog 128
      --timeout 300
      --save 900 1
      --save 300 10
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 192M
          cpus: '0.1'
    networks:
      - staging

# ======================================================
# VMLC apps
# ======================================================

  db-migrate:
    <<: *vmlc-common
    entrypoint: ""
    command: ["./scripts/runmigrations.sh"]
    depends_on:
      - db
    environment:
      <<: [*vmlc-env, *staging-otel-env]
    deploy:
      mode: replicated-job
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
        window: 300s
      resources:
        limits:
          memory: 384M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.15'

  django:
    <<: *vmlc-common
    entrypoint: ./scripts/entrypoint.sh
    command:
      - opentelemetry-instrument
      - --traces_exporter
      - otlp
      - --metrics_exporter
      - otlp
      - --logs_exporter
      - otlp
      - ./scripts/runserver.sh
    environment:
      <<: [*vmlc-env, *staging-otel-env]
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=staging,service.instance.id=django
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.rule=Host(`staging-api.verboheit.org`)"
      - "traefik.http.routers.django.entrypoints=websecure"
      - "traefik.http.routers.django.tls.certresolver=le"
      - "traefik.http.routers.django.tls=true"
      - "traefik.http.services.django.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 5 --silent --show-error || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 120s
    deploy:
      update_config:
        order: start-first
      mode: replicated
      replicas: 2
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.3'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  celery_worker:
    <<: *vmlc-common
    entrypoint: ./scripts/entrypoint.sh
    command:
      - opentelemetry-instrument
      - --traces_exporter
      - otlp
      - --metrics_exporter
      - otlp
      - --logs_exporter
      - otlp
      - celery
      - -A
      - config
      - worker
      - -l
      - warning
      - --concurrency=2
      - --max-tasks-per-child=50
      - --time-limit=300
      - -Q
      - default,emails,comms,scoring,files,reports,cache
    environment:
      <<: [*vmlc-env, *staging-otel-env]
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=staging,service.instance.id=celery_worker
      CELERY_WORKER_SEND_TASK_EVENTS: "true"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping", "-t", "10"]
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 180s
    depends_on:
      - redis
      - db
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      resources:
        limits:
          memory: 768M
          cpus: '0.4'
        reservations:
          memory: 512M
          cpus: '0.2'

  celery_beat:
    <<: *vmlc-common
    entrypoint: ./scripts/entrypoint.sh
    command:
      - celery
      - -A
      - config
      - beat
      - -l
      - warning
      - --scheduler
      - django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: [*vmlc-env, *staging-otel-env]
    depends_on:
      - redis
      - db
    deploy:
      update_config:
        order: start-first
      resources:
        limits:
          memory: 256M
          cpus: '0.1'
        reservations:
          memory: 123M
          cpus: '0.05'

# ======================================================
# Observability
# ======================================================
  alloy:
    image: grafana/alloy:v1.12.0
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    configs:
      - source: alloy_config
        target: /etc/alloy/config.alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - alloy:/var/lib/alloy/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alloy.rule=Host(`staging-ops.verboheit.org`) && PathPrefix(`/alloy`)"
      - "traefik.http.routers.alloy.entrypoints=websecure"
      - "traefik.http.routers.alloy.tls=true"
      - "traefik.http.services.alloy.loadbalancer.server.port=12345"
    networks:
      - staging
    deploy:
      mode: global
      resources:
        limits:
          memory: 384M
          cpus: '0.3'
        reservations:
          memory: 256M
          cpus: '0.15'

  prometheus:
    image: prom/prometheus:v3.7.2
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--enable-feature=exemplar-storage'
      - '--enable-feature=native-histograms'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus:/prometheus
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 384M
          cpus: '0.15'

  loki:
    image: grafana/loki:3.5
    command: -config.file=/etc/loki/local-config.yaml
    configs:
      - source: loki_config
        target: /etc/loki/local-config.yaml
    volumes:
      - loki:/loki
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'

  tempo:
    image: grafana/tempo:main-a3e0bf4
    command: ["-config.file=/etc/tempo/tempo-local.yaml"]
    configs:
      - source: tempo_config
        target: /etc/tempo/tempo-local.yaml
    volumes:
      - tempo:/tmp/tempo
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.2'
        reservations:
            memory: 384M
            cpus: '0.1'

  grafana:
    image: grafana/grafana:12.2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`staging-ops.verboheit.org`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.routers.grafana.tls=true" 
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    secrets:
      - su-email
      - su-password
      - gmail-host-user
      - gmail-host-password
    environment:
      - GF_SERVER_ROOT_URL=https://staging-ops.verboheit.org
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_ADMIN_EMAIL__FILE=/run/secrets/su-email
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/su-password
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_INSTALL_PLUGINS=
      - GF_PLUGINS_DISABLE_INSTALLATION=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_UPDATE_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_PLUGINS_PREINSTALL=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=olujay.dev.testing@gmail.com
      - GF_SMTP_PASSWORD__FILE=/run/secrets/gmail-host-password
      - GF_SMTP_FROM_ADDRESS=staging-mlc@verboheit.org
      - GF_SMTP_FROM_NAME="Verboheit MLC - Ops"
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS
    configs:
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
    volumes:
      - grafana:/var/lib/grafana
    networks:
      - staging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 192M
          cpus: '0.1'

networks:
  staging:
    external: true
    
volumes:
  db:
  redis:
  media:
  static:
  alloy:
  loki:
  tempo:
  grafana:
  prometheus:
  letsencrypt:

secrets:
  aws-access-key-id:
    external: true
  aws-secret-access-key:
    external: true
  database-url:
    external: true
  django-admin-url:
    external: true
  gmail-host-user:
    external: true
  gmail-host-password:
    external: true
  db-password:
    external: true
  django-secret-key:
    external: true
  su-email:
    external: true
  su-password:
    external: true
  # twilio-account-sid:
  #   external: true
  # twilio-auth-token:
  #   external: true
  # twilio-from-phone:
  #   external: true



configs:
  prometheus_config:
    file: ./prometheus.yml
  loki_config:
    file: ./loki.yml
  tempo_config:
    file: ./tempo.yml
  grafana_datasources:
    file: ./grafana/datasources.yml
  grafana_dashboards:
    file: ./grafana/dashboards.yml
  alloy_config:
    file: ./alloy.alloy