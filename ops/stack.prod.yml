# Production environment overrides
# Deploy: docker stack deploy -c stack.base.yml -c stack.prod.yml vmlc-prod

x-vmlc-prod-env: &vmlc-prod-env
  OTEL_SERVICE_NAME: ${COMPOSE_PROJECT_NAME}_prod
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod
  ALLOWED_HOSTS: api.verboheit.org,localhost
  AWS_STORAGE_BUCKET_NAME: vmlc-prod
  CORS_ALLOWED_ORIGINS: https://portal.verboheit.org
  CORS_ALLOW_ALL_ORIGINS: "false"
  DEFAULT_FROM_EMAIL: "Verboheit MLC <mlc@verboheit.org>"
  DJANGO_SETTINGS_MODULE: config.settings.production
  FRONTEND_BASE_URL: "portal.verboheit.org"
  GUNICORN_WORKERS: "3"

services:
  traefik:
    command:
      - "--providers.docker.network=prod"
    volumes:
      - "prod_letsencrypt:/letsencrypt"
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 192M
          cpus: '0.15'

  db:
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.max=10000
      -c pg_stat_statements.track=top
      -c log_min_duration_statement=3000
      -c max_connections=120
      -c shared_buffers=512MB
      -c effective_cache_size=3GB
      -c work_mem=8MB
      -c maintenance_work_mem=192MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
    environment:
      - POSTGRES_DB=vmlc_prod
      - POSTGRES_USER=verboheit_prod
    volumes:
      - prod_db:/var/lib/postgresql/data
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 1792M
          cpus: '1.25'
        reservations:
          memory: 1024M
          cpus: '0.5'

  redis:
    command: >
      redis-server
      --maxmemory 1024mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
      --tcp-backlog 511
      --timeout 300
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
    volumes:
      - prod_redis:/data
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 640M
          cpus: '0.3'
        reservations:
          memory: 512M
          cpus: '0.15'

  db-migrate:
    environment: *vmlc-prod-env
    volumes:
      - prod_media:/home/verboheit/web/media
      - prod_static:/home/verboheit/web/staticfiles
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 384M
          cpus: '0.2'

  django:
    environment: *vmlc-prod-env
    volumes:
      - prod_media:/home/verboheit/web/media
      - prod_static:/home/verboheit/web/staticfiles
    labels:
      - "traefik.http.routers.django.rule=Host(`api.verboheit.org`)"
    networks:
      - prod
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1024M
          cpus: '0.75'
        reservations:
          memory: 768M
          cpus: '0.5'

  celery_worker:
    environment: *vmlc-prod-env
    volumes:
      - prod_media:/home/verboheit/web/media
      - prod_static:/home/verboheit/web/staticfiles
    command:
      - opentelemetry-instrument
      - --traces_exporter
      - otlp
      - --metrics_exporter
      - otlp
      - --logs_exporter
      - otlp
      - celery
      - -A
      - config
      - worker
      - -l
      - warning
      - --concurrency=4
      - --max-tasks-per-child=100
      - --time-limit=600
      - -Q
      - default,emails,comms,scoring,files,reports,cache
    networks:
      - prod
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1024M
          cpus: '0.75'
        reservations:
          memory: 768M
          cpus: '0.5'

  celery_beat:
    environment: *vmlc-prod-env
    volumes:
      - prod_media:/home/verboheit/web/media
      - prod_static:/home/verboheit/web/staticfiles
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.15'
        reservations:
          memory: 256M
          cpus: '0.1'

  alloy:
    volumes:
      - prod_alloy:/var/lib/alloy/data
    labels:
      - "traefik.http.routers.alloy.rule=Host(`ops.verboheit.org`) && PathPrefix(`/alloy`)"
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.4'
        reservations:
          memory: 384M
          cpus: '0.2'

  prometheus:
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.retention.size=20GB'
      - '--enable-feature=exemplar-storage'
      - '--enable-feature=native-histograms'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - prod_prometheus:/prometheus
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  loki:
    volumes:
      - prod_loki:/loki
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 384M
          cpus: '0.15'

  tempo:
    volumes:
      - prod_tempo:/tmp/tempo
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.3'
        reservations:
          memory: 512M
          cpus: '0.15'

  grafana:
    environment:
      GF_SERVER_ROOT_URL: https://ops.verboheit.org
      GF_SMTP_FROM_ADDRESS: verboheitmlc@gmail.com
    volumes:
      - prod_grafana:/var/lib/grafana
    labels:
      - "traefik.http.routers.grafana.rule=Host(`ops.verboheit.org`)"
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.3'
        reservations:
          memory: 256M
          cpus: '0.15'

networks:
  prod:
    external: true

volumes:
  prod_db:
  prod_redis:
  prod_media:
  prod_static:
  prod_alloy:
  prod_loki:
  prod_tempo:
  prod_grafana:
  prod_prometheus:
  prod_letsencrypt: