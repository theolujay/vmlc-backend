# Base configuration for staging and production
services:
  web:
    build: 
      context: .
      target: production
    volumes:
      - media_data:/home/app/web/media
      - static_data:/home/app/web/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "gosu", "app", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:17.5-bookworm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  celery_worker:
    build: 
      context: .
      target: production
    command: ["celery", "-A", "config", "worker", "-l", "info", "--events"]
    volumes:
      - media_data:/home/app/web/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - C_FORCE_ROOT=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  flower:
    build: 
      context: .
      target: production
    command: ["celery", "-A", "config", "flower", "--address=0.0.0.0", "--port=5555"]
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data: