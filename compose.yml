x-dev-security: &dev-security
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID

x-app-base: &app-base
  build:
    context: .
    target: development
    args:
      - INSTALL_DEV=true
  image: vmlc-backend:dev
  volumes:
    - ./vmlc/migrations:/app/vmlc/migrations
  #   - dev_media:/app/media
  #   - dev_static:/app/staticfiles
  #   - ./:/app
  #   # - /app/.venv
  develop:
    watch:
      - action: sync
        path: .
        target: /app
        ignore:
          - vmlc/migrations
          - .venv/
          # - config/certs/
      - action: rebuild
        path: ./uv.lock
  environment:
    - UV_NO_DEV=0
    # - DATABASE_URL=postgresql://postgres:dev_password_123@db:5432/vmlc_dev
  env_file: .env
  networks:
    - dev
  dns:
    - 8.8.8.8
    - 8.8.4.4
  <<: *dev-security

services:
  db:
    image: postgres:17.2-bookworm
    ports:
      - "5432:5432"
    volumes:
      - dev_db:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    env_file: .env
    networks:
      - dev

  redis:
    image: redis:7.2.4-alpine
    volumes:
      - dev_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dev
  db-migrate:
    <<: *app-base
    entrypoint: ""
    command: ["./scripts/runmigrations.sh"]
    depends_on:
      - db
      - redis
    deploy:
      mode: replicated-job
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
  django:
    <<: *app-base
    entrypoint: "./scripts/entrypoint.sh"
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - db-migrate
    environment:
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.instance.id=django
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.rule=Host(`dev-api.localhost`)"
      - "traefik.http.services.django.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 10 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.2'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  celery_worker:
    <<: *app-base
    entrypoint: "./scripts/entrypoint.sh"
    command:
      - celery
      - -A
      - config
      - worker
      - -l
      - warning
      - --concurrency=2
      - --max-tasks-per-child=100
      - --time-limit=300
      - -Q
      - default,emails,comms,scoring,files,reports,cache
    depends_on:
      - db
      - redis
      - db-migrate
    environment:
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.instance.id=celery_worker
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.15'
        reservations:
          memory: 256M
          cpus: '0.075'


  celery_beat:
    <<: *app-base
    entrypoint: "./scripts/entrypoint.sh"
    command: 
      - celery
      - -A
      - config
      - beat
      - -l
      - warning
      - --scheduler
      - django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
      - db-migrate
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.05'
        reservations:
          memory: 50M
          cpus: '0.03'

volumes:
  dev_letsencrypt:
  dev_db:
  dev_redis:
  dev_media:
  dev_static:
  dev_loki:
  dev_tempo:
  dev_grafana:
  dev_prometheus:

networks:
  dev:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_dev