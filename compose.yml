x-vmlc-base: &vmlc-base
  image: vmlc-backend:dev
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - backend
x-dev-volumes: &dev-volumes
  - .:/home/verboheit/web
  - ./dev_data/staticfiles:/home/verboheit/web/staticfiles
  - ./dev_data/media:/home/verboheit/web/media
  - ./dev_data/logs:/home/verboheit/web/logs

x-vmlc-security: &vmlc-security
  cap_drop: [ALL]
  cap_add: [CHOWN, SETGID, SETUID]
  security_opt: [no-new-privileges:true]

services:
  web:
    <<: *vmlc-base

    container_name: web
    command: ["/home/verboheit/web/scripts/runserver.sh"]
    volumes: *dev-volumes
    networks:
      - backend
      - frontend

  db:
    image: postgres:17.2-bookworm
    container_name: db
    volumes:
      - ./dev_data/db:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  redis:
    image: redis:7.2.4-alpine
    container_name: redis
    volumes:
      - ./dev_data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend

  celery_worker:
    <<: *vmlc-base
    container_name: celery_worker
    command: ["celery", "-A", "config", "worker", "-l", "info", "--events", "-Q", "default,emails,comms,scoring,files,reports,cache"]
    volumes: *dev-volumes
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping", "-d", "celery@%h"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    <<: *vmlc-base
    container_name: celery_beat
    command: ["celery", "-A", "config", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    volumes: *dev-volumes

  flower:
    <<: *vmlc-base
    container_name: flower
    command: ["celery", "-A", "config", "flower", "--address=0.0.0.0", "--port=5555"]
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/workers", "--max-time", "5"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
