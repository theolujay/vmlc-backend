x-dev-security: &dev-security
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID

x-app-base: &app-base
  build:
    context: .
    target: development
    args:
      - INSTALL_DEV=true
  image: vmlc-backend:dev
  volumes:
    - dev_media:/app/media
    - dev_static:/app/staticfiles
  develop:
    watch:
      - action: sync
        path: ./
        target: /app/
      - action: rebuild
        path: ./uv.lock
      - action: rebuild
        path: ./pyproject.toml

  environment:
    - UV_NO_DEV=0
  env_file: .env
  networks:
    - dev
  dns:
    - 8.8.8.8
    - 8.8.4.4
  <<: *dev-security
  logging:
    driver: "local"
    options:
      mode: "non-blocking"
      max-buffer-size: "4m"
      max-size: "10m"
      max-file: "3"

services:
  db:
    image: postgres:17.2-bookworm
    ports:
      - "5432:5432"
    volumes:
      - dev_db:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    env_file: .env
    networks:
      - dev

  redis:
    image: redis:7.2.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - dev_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dev
  db-migrate:
    <<: *app-base
    entrypoint: ""
    command: ["./scripts/runmigrations.sh"]
    depends_on:
      - db
      - redis
    deploy:
      mode: replicated-job
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
  django:
    <<: *app-base
    container_name: vmlc-django
    entrypoint: "./scripts/entrypoint.sh"
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --lifespan off --reload --no-access-log
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - db-migrate
    environment:
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.instance.id=django
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 10 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  celery_worker:
    <<: *app-base
    container_name: vmlc-celery_worker
    entrypoint: "./scripts/entrypoint.sh"
    command:
      - celery
      - -A
      - config
      - worker
      - -l
      - warning
      - --concurrency=2
      - --max-tasks-per-child=100
      - --time-limit=300
      - -Q
      - default,emails,comms,scoring,files,reports,cache
    depends_on:
      - db
      - redis
      - db-migrate
    environment:
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.instance.id=celery_worker
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.3'
        reservations:
          memory: 512M
          cpus: '0.15'


  celery_beat:
    <<: *app-base
    container_name: vmlc-celery_beat
    entrypoint: "./scripts/entrypoint.sh"
    command:
      - celery
      - -A
      - config
      - beat
      - -l
      - warning
      - --scheduler
      - django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
      - db-migrate
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 50M
          cpus: '0.1'

  flower:
    <<: *app-base
    container_name: vmlc-flower
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  dev_db:
  dev_redis:
  dev_media:
  dev_static:

networks:
  dev:
    # external: true
    name: ${COMPOSE_PROJECT_NAME}_dev