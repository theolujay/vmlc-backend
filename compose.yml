services:
  web:
    build:
      context: .
      target: development
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/home/vmlc/web
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  celery_worker:
    build:
      context: .
      target: development
    command: celery -A config worker -l info
    volumes:
      - .:/home/vmlc/web
    env_file: .env
    depends_on:
      - redis
      - db

  flower:
    build:
      context: .
      target: development
    command: celery -A config flower --address=0.0.0.0
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
      - celery_worker

volumes:
  postgres_data: