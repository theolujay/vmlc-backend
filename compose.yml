networks:
  verboheit:
    driver: bridge

volumes:
  grafana-storage: {}
    
services:
  web:
    build:
      context: .
      target: development
    # command: python manage.py runserver 0.0.0.0:8000
    command: ./scripts/runserver.sh
    volumes:
      - .:/home/verboheit/web
      - ./dev_data/staticfiles:/home/verboheit/web/staticfiles
      - ./dev_data/media:/home/verboheit/web/media
      - ./dev_data/logs:/home/verboheit/web/logs
    ports:
      - "8000:8000"
    networks:
      - verboheit
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/"]
      interval: 300s
      timeout: 5s
      retries: 3
      start_period: 60s

  db:
    image: postgres:17-alpine
    volumes:
      - ./dev_data/db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - verboheit
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - verboheit
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # High Priority - Comms workers (fast, dedicated)
  celery_comms:
    build:
      context: .
      target: development
    command: celery -A config worker --queues=comms --concurrency=2 --loglevel=INFO --hostname=comms@%h
    volumes:
      - .:/home/verboheit/web
      - ./dev_data/staticfiles:/home/verboheit/web/staticfiles
      - ./dev_data/media:/home/verboheit/web/media
      - ./dev_data/logs:/home/verboheit/web/logs
    env_file: .env
    networks:
      - verboheit
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "celery.*worker.*comms"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Medium Priority - Processing workers
  celery_processing:
    build:
      context: .
      target: development
    command: celery -A config worker --queues=scoring,files --concurrency=2 --loglevel=INFO --hostname=processing@%h
    volumes:
      - .:/home/verboheit/web
      - ./dev_data/staticfiles:/home/verboheit/web/staticfiles
      - ./dev_data/media:/home/verboheit/web/media
      - ./dev_data/logs:/home/verboheit/web/logs
    env_file: .env
    networks:
      - verboheit
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "celery.*worker.*(scoring|files)"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Low Priority - Background workers  
  celery_background:
    build:
      context: .
      target: development
    command: celery -A config worker --queues=reports,cache --concurrency=1 --loglevel=INFO --hostname=background@%h
    volumes:
      - .:/home/verboheit/web
      - ./dev_data/staticfiles:/home/verboheit/web/staticfiles
      - ./dev_data/media:/home/verboheit/web/media
      - ./dev_data/logs:/home/verboheit/web/logs
    env_file: .env
    networks:
      - verboheit
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "celery.*worker.*(reports|cache)"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery_beat:
    build:
      context: .
      target: development
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/home/verboheit/web
      - ./dev_data/staticfiles:/home/verboheit/web/staticfiles
      - ./dev_data/media:/home/verboheit/web/media
      - ./dev_data/logs:/home/verboheit/web/logs
    env_file: .env
    networks:
      - verboheit
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "celery.*beat"]
      interval: 300s
      timeout: 5s
      retries: 3
      start_period: 60s

  flower:
    build:
      context: .
      target: development
    command: celery -A config flower --address=0.0.0.0 --port=5555
    volumes:
      - .:/home/verboheit/web
      - ./dev_data/staticfiles:/home/verboheit/web/staticfiles
      - ./dev_data/media:/home/verboheit/web/media
      - ./dev_data/logs:/home/verboheit/web/logs
    ports:
      - "5555:5555"
    networks:
      - verboheit
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      celery_comms:
        condition: service_healthy
      celery_processing:
        condition: service_healthy
      celery_background:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/"]
      interval: 300s
      timeout: 5s
      retries: 3
      start_period: 30s


  prometheus:
    image: prom/prometheus:v3.6.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - verboheit
  
  grafana:
    image: grafana/grafana
    environment:
      - GF_SERVER_HTTP_PORT=3030
    ports:
      - "3030:3030"
    depends_on:
      - prometheus
    networks:
      - verboheit  
    volumes:
      - grafana-storage:/var/lib/grafana