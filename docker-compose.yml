services:
  web:
    build: .
    volumes:
      - .:/home/app/web
      - ./media:/home/app/web/media
      - ./staticfiles:/home/app/web/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:17.5-bookworm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build: .
    command: ["celery", "-A", "config", "worker", "-l", "info", "--events"]
    volumes:
      - .:/home/app/web
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  flower:
    build: .
    command: ["celery", "-A", "config", "flower", "--address=0.0.0.0"]
    ports:
      - "5555:5555"
    env_file:
      - ./.env
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started
      celery_worker:
        condition: service_started

volumes:
  postgres_data: