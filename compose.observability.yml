services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector.yml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318" # OTLP HTTP receiver
      - "9464:9464" # Prometheus metrics exporter
    networks:
      - dev
      - staging
      - prod
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--enable-feature=exemplar-storage'
      - '--enable-feature=native-histograms'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - dev
      - staging
      - prod
    restart: unless-stopped
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:latest
    container_name: loki
    user: root
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - dev
      - staging
      - prod
    restart: unless-stopped
    depends_on:
      - otel-collector

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    user: "0:0"
    volumes:
      - ./tempo.yml:/etc/tempo/tempo-local.yaml:ro
      - tempo_data:/tmp/tempo
    command: ["-config.file=/etc/tempo/tempo-local.yaml"]
    ports:
      - "3200:3200"
    networks:
      - dev
      - staging
      - prod
    restart: unless-stopped
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_ADMIN_USER=admin 
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
      - GF_PLUGINS_DISABLE_INSTALLATION=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_UPDATE_CHECK_FOR_UPDATES=false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`staging-api.verboheit.org`) && (PathPrefix(`/traefik`))"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=le"
      - "traefik.http.routers.web.tls=true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/dashboards/:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - dev
      - staging
      - prod
    restart: unless-stopped
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:


networks:
  dev:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_dev
  staging:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_staging
  prod:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_prod