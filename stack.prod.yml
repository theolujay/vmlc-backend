x-security: &security
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID
  
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_SERVICE_NAME: ${COMPOSE_PROJECT_NAME}_prod
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.01"

x-vmlc-env: &vmlc-env
  AWS_ACCESS_KEY_ID_FILE: /run/secrets/aws-access-key-id
  AWS_SECRET_ACCESS_KEY_FILE: /run/secrets/aws-secret-access-key
  DATABASE_URL_FILE: /run/secrets/database-url
  DJANGO_ADMIN_URL_FILE: /run/secrets/django-admin-url
  EMAIL_HOST_PASSWORD_FILE: /run/secrets/gmail-host-password
  SECRET_KEY_FILE: /run/secrets/django-secret-key
  SUPERUSER_PASSWORD_FILE: /run/secrets/su-password
  ALLOWED_HOSTS: api.verboheit.org,localhost
  AWS_S3_REGION_NAME: eu-central-1
  AWS_STORAGE_BUCKET_NAME: vmlc-prod
  CACHE_REDIS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  CORS_ALLOWED_ORIGINS: https://portal.verboheit.org
  CORS_ALLOW_ALL_ORIGINS: "false"
  CORS_ALLOW_CREDENTIALS: "true"
  DEBUG: "false"
  DEFAULT_FROM_EMAIL: verboheitmlc@gmail.com
  DJANGO_SETTINGS_MODULE: config.settings.prod
  EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
  EMAIL_HOST: smtp.gmail.com
  EMAIL_HOST_USER: verboheitmlc@gmail.com
  EMAIL_PORT: 587
  EMAIL_USE_TLS: "true"
  FRONTEND_BASE_URL: "portal.verboheit.org"
  GUNICORN_WORKERS: 2
  INTERNAL_IPS: 127.0.0.1,0.0.0.0,localhost
  OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
  OTEL_LOGS_EXPORTER: otlp
  REDIS_URL: redis://redis:6379/0
  PORT: 8000
  POSTGRES_DB: vmlc_prod
  POSTGRES_USER: verboheit_prod
  SUPERUSER_EMAIL: olujay.dev@gmail.com

x-vmlc-common: &vmlc-common
  image: ghcr.io/verboheit/vmlc-backend:${GIT_COMMIT_HASH:-prod}
  volumes:
    - prod_media:/home/verboheit/web/media
    - prod_static:/home/verboheit/web/staticfiles
  secrets:
    - aws-access-key-id
    - aws-secret-access-key
    - database-url
    - django-admin-url
    - gmail-host-password
    - django-secret-key
    - su-password
  labels:
    - "traefik.enable=true"
  networks:
    - prod
  dns:
    - 8.8.8.8
    - 8.8.4.4
  <<: *security


services:
  traefik:
    image: traefik:v3.5.3
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${COMPOSE_PROJECT_NAME}_prod"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=verboheitconsulting@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.caserver=https://acme-v02.api.letsencrypt.org/directory"
      - "--metrics.prometheus=false"
      - "--metrics.otlp=true"
      - "--metrics.otlp.http=true"
      - "--metrics.otlp.grpc=false"
      - "--metrics.otlp.http.endpoint=http://otel-collector:4318/v1/metrics"
      - "--metrics.otlp.serviceName=traefik"
      - "--metrics.otlp.addEntryPointsLabels=true"
      - "--metrics.otlp.addRoutersLabels=true"
      - "--metrics.otlp.addServicesLabels=true"
      - "--tracing=true"
      - "--tracing.serviceName=traefik"
      - "--tracing.sampleRate=0.05"
      - "--tracing.otlp.grpc=false"
      - "--tracing.otlp.http=true"
      - "--tracing.otlp.http.endpoint=http://otel-collector:4318/v1/traces"
      - "--log.level=INFO"
      - "--log.format=json"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - prod_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: '0.15'
        reservations:
          memory: 48M
          cpus: '0.05'

  db:
    image: postgres:17.2-bookworm
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.max=10000
      -c pg_stat_statements.track=top
      -c log_min_duration_statement=3000
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=8MB
      # -c min_wal_size=1GB
      # -c max_wal_size=4GB
      # -c checkpoint_completion_target=0.9
      # -c default_statistics_target=100
    secrets:
      - db-password
    environment:
      - POSTGRES_DB=vmlc_prod
      - POSTGRES_USER=verboheit_prod
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    volumes:
      - prod_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    networks:
      - prod

  redis:
    image: redis:7.2.4-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
      --tcp-backlog 128
      --timeout 300
      --save 900 1
      --save 300 10
      # --save 60 10000
      # --appendonly yes
      # --appendfsync everysec
    volumes:
      - prod_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'
    networks:
      - prod

  db-migrate:
    <<: *vmlc-common
    entrypoint: ""
    command: ["./scripts/runmigrations.sh"]
    depends_on:
      - db
      - redis
    environment:
      <<: [*vmlc-env, *otel-env]
    deploy:
      mode: replicated-job
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
        window: 300s
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  django:
    <<: *vmlc-common
    entrypoint: ./scripts/entrypoint.sh
    command:
      - opentelemetry-instrument
      - --traces_exporter
      - otlp
      - --metrics_exporter
      - otlp
      - --logs_exporter
      - otlp
      - ./scripts/runserver.sh
    environment:
      <<: [*vmlc-env, *otel-env]
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod,service.instance.id=django
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.rule=Host(`api.verboheit.org`)"
      - "traefik.http.routers.django.entrypoints=websecure"
      - "traefik.http.routers.django.tls.certresolver=le"
      - "traefik.http.routers.django.tls=true"
      - "traefik.http.services.django.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 5 --silent --show-error || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 90s
    depends_on:
      - db-migrate
      - otel-collector
    deploy:
      update_config:
        order: start-first
      mode: replicated
      replicas: 3
      resources:
        limits:
          memory: 1024M
          cpus: '0.75'
        reservations:
          memory: 512M
          cpus: '0.3'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  celery_worker:
    <<: *vmlc-common
    entrypoint: ./scripts/entrypoint.sh
    command:
      - opentelemetry-instrument
      - --traces_exporter
      - otlp
      - --metrics_exporter
      - otlp
      - --logs_exporter
      - otlp
      - celery
      - -A
      - config
      - worker
      - -l
      - warning
      - --concurrency=4
      # - --max-tasks-per-child=1000
      - --time-limit=600
      # - --soft-time-limit=540
      - -Q
      - default,emails,comms,scoring,files,reports,cache
    environment:
      <<: [*vmlc-env, *otel-env]
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod,service.instance.id=celery_worker
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 120s
      timeout: 20s
      retries: 3
      start_period: 30s
    depends_on:
      - db-migrate
      - otel-collector
    deploy:
      update_config:
        order: start-first
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  celery_beat:
    <<: *vmlc-common
    entrypoint: ./scripts/entrypoint.sh
    command:
      - celery
      - -A
      - config
      - beat
      - -l
      - warning
      - --scheduler
      - django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: [*vmlc-env, *otel-env]
    depends_on:
      - db-migrate
      - otel-collector
    deploy:
      update_config:
        order: start-first
      resources:
        limits:
          memory: 256M
          cpus: '0.1'
        reservations:
          memory: 128M
          cpus: '0.05'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yml"]
    configs:
      - source: otel_config
        target: /etc/otel/config.yml
    ports:
      - "4318:4318"
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'

  prometheus:
    image: prom/prometheus:v3.7.2
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=8GB'
      - '--enable-feature=exemplar-storage'
      - '--enable-feature=native-histograms'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prod_prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 256M
          cpus: '0.1'

  loki:
    image: grafana/loki:3.5
    command: -config.file=/etc/loki/local-config.yaml
    configs:
      - source: loki_config
        target: /etc/loki/local-config.yaml
    volumes:
      - prod_loki:/loki
    ports:
      - "3100:3100"
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.2'
        reservations:
          memory: 192M
          cpus: '0.1'

  tempo:
    image: grafana/tempo:main-a3e0bf4
    command: ["-config.file=/etc/tempo/tempo-local.yaml"]
    configs:
      - source: tempo_config
        target: /etc/tempo/tempo-local.yaml
    volumes:
      - prod_tempo:/tmp/tempo
    ports:
      - "3200:3200"
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.3'
        reservations:
          memory: 384M
          cpus: '0.15'

  grafana:
    image: grafana/grafana:12.2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`ops.verboheit.org`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    secrets:
      - su-password
    environment:
      - GF_SERVER_ROOT_URL=https://ops.verboheit.org
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_ADMIN_USER=olujay.dev@gmail.com
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/su-password
      - GF_INSTALL_PLUGINS=
      - GF_PLUGINS_DISABLE_INSTALLATION=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_UPDATE_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    configs:
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
    volumes:
      - prod_grafana:/var/lib/grafana
    networks:
      - prod
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'

networks:
  prod:
    external: true
    
volumes:
  prod_db:
  prod_redis:
  prod_media:
  prod_static:
  prod_loki:
  prod_tempo:
  prod_grafana:
  prod_prometheus:
  prod_letsencrypt:

secrets:
  aws-access-key-id:
    external: true
  aws-secret-access-key:
    external: true
  database-url:
    external: true
  django-admin-url:
    external: true
  gmail-host-password:
    external: true
  db-password:
    external: true
  django-secret-key:
    external: true
  su-password:
    external: true

configs:
  otel_config:
    file: ./otel.yml
  prometheus_config:
    file: ./prometheus.yml
  loki_config:
    file: ./loki.yml
  tempo_config:
    file: ./tempo.yml
  grafana_datasources:
    file: ./grafana/datasources.yml