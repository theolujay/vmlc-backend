name: Production CI/CD pipeline

on:
  pull_request:
    types: [closed]
    branches:
      - main
  push:
    branches:
      - main
jobs:

  deploy-to-production:
    if: |
      (github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'release') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04

    environment:
      name: production
      url: https://api.verboheit.org
    
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main  # Ensure we're building from main after merge
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-prod-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-prod-
            ${{ runner.os }}-buildx-

      - name: Extract metadata
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "VERSION=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image for tests
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: test
          tags: ${{ steps.meta.outputs.REPO_NAME }}-prod-test:${{ steps.meta.outputs.SHORT_SHA }}
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
            
      - name: Run tests
        run: |
          docker network create test-network

          # postgres
          docker run -d --rm \
            -e POSTGRES_USER=${{ secrets.TEST_DB_USER || 'testuser' }} \
            -e POSTGRES_PASSWORD=${{ secrets.TEST_DB_PASSWORD || 'testpassword' }} \
            -e POSTGRES_DB=${{ secrets.TEST_DB_NAME || 'testdb' }} \
            --network test-network \
            --name db \
            --health-cmd="pg_isready -U ${{ secrets.TEST_DB_USER || 'testuser' }}" \
            --health-interval=5s \
            --health-timeout=5s \
            --health-retries=5 \
            postgres:17.2-bookworm

          # redis
          docker run -d --rm \
            --network test-network \
            --name redis \
            --health-cmd="redis-cli ping" \
            --health-interval=5s \
            --health-timeout=5s \
            --health-retries=5 \
            redis:7.2.4-alpine

          # vmlc
          echo "Waiting for database to be ready..."
          timeout 60 bash -c 'until docker exec db pg_isready -U ${{ secrets.TEST_DB_USER || 'testuser' }}; do sleep 2; done'
          echo "Database is ready!"

          docker run --rm \
            -e DATABASE_URL=postgresql://${{ secrets.TEST_DB_USER || 'testuser' }}:${{ secrets.TEST_DB_PASSWORD || 'testpassword' }}@db:5432/${{ secrets.TEST_DB_NAME || 'testdb' }} \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID || 'minio' }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY || 'minio123' }} \
            -e AWS_S3_REGION_NAME=eu-north-1 \
            -e AWS_STORAGE_BUCKET_NAME=vmlc-s3 \
            --network test-network \
            --entrypoint "" \
            ${{ steps.meta.outputs.REPO_NAME }}-prod-test:${{ steps.meta.outputs.SHORT_SHA }} \
            sh -c "python manage.py migrate --settings=config.settings.test --no-input && python manage.py test --settings=config.settings.test --noinput --keepdb --failfast"
        timeout-minutes: 10
      - name: Cleanup test containers
        if: always()
        run: |
          docker stop db redis 2>/dev/null || true
          docker network rm test-network 2>/dev/null || true
      
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache


      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Build and push Docker image to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.REPO_NAME }}:prod
            ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.REPO_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.REPO_NAME }}:${{ steps.meta.outputs.VERSION }}
          cache-from: type=local,src=/tmp/.buildx-cache
          # Add build metadata as labels for traceability
          # Docs: https://docs.docker.com/build/building/labels/
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
      # Create deployment artifact for rollback capability
      - name: Create deployment metadata
        run: |
          cat > deployment-info.json << EOF
          {
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",s
            
            "commit_sha": "${{ github.sha }}",
            "short_sha": "${{ steps.meta.outputs.SHORT_SHA }}",
            "version": "${{ steps.meta.outputs.VERSION }}",
            "deployed_by": "${{ github.actor }}",
            "pr_number": "${{ github.event.pull_request.number }}",
            "pr_title": "${{ github.event.pull_request.title }}"
          }
          EOF
          cat deployment-info.json

      - name: Create env file
        run: |
          echo "GIT_COMMIT_HASH=${{ steps.meta.outputs.SHORT_SHA }}" > ./envfile
        
      # Backup current deployment before deploying new version
      # This creates a snapshot of the running stack for quick rollback
      - name: Backup current deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            # Create backup directory if it doesn't exist
            mkdir -p ~/deployments/backups
            
            # Save current deployment info
            docker service ls --format "{{.Name}} {{.Image}}" | grep vmlc-prod > ~/deployments/backups/pre-deploy-$(date +%Y%m%d-%H%M%S).txt || true
            
            # Keep only last 10 backups
            cd ~/deployments/backups && ls -t | tail -n +11 | xargs -r rm
        continue-on-error: true

      # Main deployment step
      - name: Deploy to Production
        id: deploy
        uses: theolujay/stack-deploy-action@fix/swarm-multiple-files
        with:
          name: vmlc-prod
          file: ops/stack.base.yml ops/stack.prod.yml
          host: ${{ secrets.VPS_HOST }}
          port: 22
          user: deploy
          ssh_key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          registry_auth: true
          registry_host: ghcr.io
          registry_user: verboheit
          registry_pass: ${{ secrets.GHCR_REGISTRY_PASS }}
          resolve_image: changed
          prune: true
          mode: swarm         
          env_file: ./envfile
          summary: true

      - name: Wait for deployment health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            echo "Waiting for services to be healthy..."
            
            # Wait up to 5 minutes for services to stabilize
            for i in {1..30}; do
              # Check if all services are running
              REPLICAS=$(docker service ls --filter name=vmlc-prod --format "{{.Replicas}}" | grep -v "0/")
              
              if echo "$REPLICAS" | grep -qv "/"; then
                echo "All services are up!"
                
                # Additional health check on API endpoint
                if curl -f -s -o /dev/null -w "%{http_code}" https://api.verboheit.org/v1/health/ | grep -q "200"; then
                  echo "Health check passed!"
                  exit 0
                fi
              fi
              
              echo "Attempt $i/30: Services not ready yet..."
              sleep 10
            done
            
            echo "Deployment health check failed!"
            exit 1
        timeout-minutes: 6

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Deployed' : '❌ Failed';
            const message = `### ${status} to Production
            
            - **Version**: \`${{ steps.meta.outputs.VERSION }}\`
            - **Commit**: \`${{ steps.meta.outputs.SHORT_SHA }}\`
            - **Image**: \`ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.REPO_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}\`
            - **URL**: https://api.verboheit.org
            
            ${status === '✅ Deployed' ? '🎉 Production deployment successful!' : '⚠️ Deployment failed. Check the logs above.'}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ SUCCESS"
            COLOR="good"
          else
            STATUS="❌ FAILED"
            COLOR="danger"
          fi
          
          echo "Deployment $STATUS"
          echo "Commit: ${{ steps.meta.outputs.SHORT_SHA }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "Production Deployment '"$STATUS"'",
              "attachments": [{
                "color": "'"$COLOR"'",
                "fields": [
                  {"title": "Commit", "value": "${{ steps.meta.outputs.SHORT_SHA }}", "short": true},
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Actor", "value": "${{ github.actor }}", "short": true}
                ]
              }]
            }'

      - name: Send deployment notification
        if: always()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            # Log deployment to system
            echo "$(date): Production deployment ${{ job.status }} - Version ${{ steps.meta.outputs.VERSION }}" >> ~/deployments/deployment.log
        continue-on-error: true

  create-release:
    needs: deploy-to-production
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract metadata
        id: meta
        run: |
          echo "VERSION=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Create a GitHub release for tracking
      # Docs: https://docs.github.com/en/rest/releases/releases?apiVersion=2022-11-28#create-a-release
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.meta.outputs.VERSION }}
          release_name: Production Release ${{ steps.meta.outputs.VERSION }}
          body: |
            Production deployment from PR #${{ github.event.pull_request.number }}
            
            **Changes**: ${{ github.event.pull_request.title }}
            **Deployed by**: @${{ github.actor }}
            **Commit**: ${{ github.sha }}
          draft: false
          prerelease: false