name: Production CI/CD pipeline

on:
  pull_request:
    types: [closed]
    branches:
      - main
  push:
    branches:
      - main

# Define environment variables for the workflow
env:
  REGISTRY: ghcr.io

jobs:
  # Job 1: Check if deployment should proceed
  check-trigger:
    runs-on: ubuntu-24.04
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    
    steps:
      - name: Check deployment conditions
        id: check
        run: |
          # Deploy if:
          # 1. PR merged from 'release' branch to 'main'
          # 2. Direct push to 'main'
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            if [ "${{ github.event.pull_request.merged }}" == "true" ] && [ "${{ github.event.pull_request.head.ref }}" == "release" ]; then
              echo "should_deploy=true" >> "$GITHUB_OUTPUT"
              echo "Deployment triggered by merged PR from release branch"
            else
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              echo "Skipping: PR not merged or not from release branch"
            fi
          elif [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deployment triggered by push to main"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: Deployment conditions not met"
          fi

  # Job 2: Extract metadata and prepare build information
  prepare:
    runs-on: ubuntu-24.04
    needs: check-trigger
    if: needs.check-trigger.outputs.should_deploy == 'true'
    outputs:
      repo_name: ${{ steps.meta.outputs.REPO_NAME }}
      short_sha: ${{ steps.meta.outputs.SHORT_SHA }}
      version: ${{ steps.meta.outputs.VERSION }}
      pr_number: ${{ steps.meta.outputs.PR_NUMBER }}
      pr_title: ${{ steps.meta.outputs.PR_TITLE }}
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      
      - name: Extract metadata
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "VERSION=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "PR_NUMBER=${{ github.event.pull_request.number || 'N/A' }}" >> "$GITHUB_OUTPUT"
          echo "PR_TITLE=${{ github.event.pull_request.title || 'Direct push to main' }}" >> "$GITHUB_OUTPUT"
      
      - name: Display metadata
        run: |
          echo "Repository: ${{ steps.meta.outputs.REPO_NAME }}"
          echo "Short SHA: ${{ steps.meta.outputs.SHORT_SHA }}"
          echo "Version: ${{ steps.meta.outputs.VERSION }}"
          echo "PR Number: ${{ steps.meta.outputs.PR_NUMBER }}"
          echo "PR Title: ${{ steps.meta.outputs.PR_TITLE }}"

  # Job 3: Run all tests before production deployment
  test:
    runs-on: ubuntu-24.04
    needs: prepare
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-test-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-test-
            ${{ runner.os }}-buildx-
      
      - name: Build Docker image for tests
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: test
          tags: ${{ needs.prepare.outputs.repo_name }}-prod-test:${{ needs.prepare.outputs.short_sha }}
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      
      - name: Create test network
        run: docker network create test-network

      - name: Start PostgreSQL
        run: |
          docker run -d --rm \
            -e POSTGRES_USER=${{ secrets.TEST_DB_USER || 'testuser' }} \
            -e POSTGRES_PASSWORD=${{ secrets.TEST_DB_PASSWORD || 'testpassword' }} \
            -e POSTGRES_DB=${{ secrets.TEST_DB_NAME || 'testdb' }} \
            --network test-network \
            --name db \
            --health-cmd="pg_isready -U ${{ secrets.TEST_DB_USER || 'testuser' }}" \
            --health-interval=5s \
            --health-timeout=5s \
            --health-retries=5 \
            postgres:17.2-bookworm

      - name: Start Redis
        run: |
          docker run -d --rm \
            --network test-network \
            --name redis \
            --health-cmd="redis-cli ping" \
            --health-interval=5s \
            --health-timeout=5s \
            --health-retries=5 \
            redis:7.2.4-alpine

      - name: Wait for database readiness
        run: |
          echo "Waiting for database to be ready..."
          timeout 60 bash -c 'until docker exec db pg_isready -U ${{ secrets.TEST_DB_USER || 'testuser' }}; do sleep 2; done'
          echo "Database is ready!"

      - name: Run tests
        run: |
          docker run --rm \
            -e DATABASE_URL=postgresql://${{ secrets.TEST_DB_USER || 'testuser' }}:${{ secrets.TEST_DB_PASSWORD || 'testpassword' }}@db:5432/${{ secrets.TEST_DB_NAME || 'testdb' }} \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID || 'minio' }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY || 'minio123' }} \
            -e AWS_S3_REGION_NAME=eu-north-1 \
            -e AWS_STORAGE_BUCKET_NAME=vmlc-s3 \
            --network test-network \
            --entrypoint "" \
            ${{ needs.prepare.outputs.repo_name }}-prod-test:${{ needs.prepare.outputs.short_sha }} \
            sh -c "python manage.py migrate --settings=config.settings.test --no-input && python manage.py test --settings=config.settings.test --noinput --keepdb --failfast"
        timeout-minutes: 10

      - name: Cleanup test containers
        if: always()
        run: |
          docker stop db redis 2>/dev/null || true
          docker network rm test-network 2>/dev/null || true
      
      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          if [ -d /tmp/.buildx-cache-new ]; then
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi

  # Job 4: Build and push production Docker image
  build:
    runs-on: ubuntu-24.04
    needs: [prepare, test]
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-prod-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-prod-
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ needs.prepare.outputs.repo_name }}:prod
            ghcr.io/${{ github.repository_owner }}/${{ needs.prepare.outputs.repo_name }}:${{ needs.prepare.outputs.short_sha }}
            ghcr.io/${{ github.repository_owner }}/${{ needs.prepare.outputs.repo_name }}:${{ needs.prepare.outputs.version }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
      
      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          if [ -d /tmp/.buildx-cache-new ]; then
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi

  # Job 5: Backup current deployment before deploying new version
  backup:
    runs-on: ubuntu-24.04
    needs: [prepare, build]
    
    steps:
      - name: Backup current deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            # Create backup directory if it doesn't exist
            mkdir -p ~/deployments/backups
            
            # Save current deployment info
            docker service ls --format "{{.Name}} {{.Image}}" | grep vmlc-prod > ~/deployments/backups/pre-deploy-$(date +%Y%m%d-%H%M%S).txt || true
            
            # Keep only last 10 backups
            cd ~/deployments/backups && ls -t | tail -n +11 | xargs -r rm
        continue-on-error: true

  # Job 6: Deploy to production environment
  deploy:
    runs-on: ubuntu-24.04
    needs: [prepare, backup]
    environment:
      name: production
      url: https://api.verboheit.org
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Create deployment metadata
        run: |
          cat > deployment-info.json << EOF
          {
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit_sha": "${{ github.sha }}",
            "short_sha": "${{ needs.prepare.outputs.short_sha }}",
            "version": "${{ needs.prepare.outputs.version }}",
            "deployed_by": "${{ github.actor }}",
            "pr_number": "${{ needs.prepare.outputs.pr_number }}",
            "pr_title": "${{ needs.prepare.outputs.pr_title }}"
          }
          EOF
          cat deployment-info.json

      - name: Create env file
        run: |
          echo "GIT_COMMIT_HASH=${{ needs.prepare.outputs.short_sha }}" > ./envfile

      - name: Deploy to Production
        uses: cssnr/stack-deploy-action@v1.5.0
        with:
          name: vmlc-prod
          file: infra/stack.base.yml infra/stack.prod.yml
          host: ${{ secrets.VPS_HOST }}
          port: 22
          user: deploy
          ssh_key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          registry_auth: true
          registry_host: ghcr.io
          registry_user: verboheit
          registry_pass: ${{ secrets.GHCR_REGISTRY_PASS }}
          resolve_image: changed
          prune: true
          mode: swarm         
          env_file: ./envfile
          summary: true

  # Job 7: Verify deployment health
  verify:
    runs-on: ubuntu-24.04
    needs: [prepare, deploy]
    
    steps:
      - name: Wait for deployment health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            echo "Waiting for services to be healthy..."
            
            # Wait up to 5 minutes for services to stabilize
            for i in {1..30}; do
              # Check if all services are running
              REPLICAS=$(docker service ls --filter name=vmlc-prod --format "{{.Replicas}}" | grep -v "0/")
              
              if echo "$REPLICAS" | grep -qv "/"; then
                echo "All services are up!"
                
                # Additional health check on API endpoint
                if curl -f -s -o /dev/null -w "%{http_code}" https://api.verboheit.org/v1/health/ | grep -q "200"; then
                  echo "Health check passed!"
                  exit 0
                fi
              fi
              
              echo "Attempt $i/30: Services not ready yet..."
              sleep 10
            done
            
            echo "Deployment health check failed!"
            exit 1
        timeout-minutes: 6

  # Job 8: Comment on PR with deployment status
  comment-pr:
    runs-on: ubuntu-24.04
    needs: [prepare, verify]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    
    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.verify.result }}" == "success" ]; then
            echo "STATUS=✅ Deployed" >> "$GITHUB_OUTPUT"
            echo "MESSAGE=🎉 Production deployment successful!" >> "$GITHUB_OUTPUT"
          else
            echo "STATUS=❌ Failed" >> "$GITHUB_OUTPUT"
            echo "MESSAGE=⚠️ Deployment failed. Check the logs above." >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const message = `### ${{ steps.status.outputs.STATUS }} to Production
            
            - **Version**: \`${{ needs.prepare.outputs.version }}\`
            - **Commit**: \`${{ needs.prepare.outputs.short_sha }}\`
            - **Image**: \`ghcr.io/${{ github.repository_owner }}/${{ needs.prepare.outputs.repo_name }}:${{ needs.prepare.outputs.short_sha }}\`
            - **URL**: https://api.verboheit.org
            
            ${{ steps.status.outputs.MESSAGE }}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  # Job 9: Send notifications about deployment status
  notify:
    runs-on: ubuntu-24.04
    needs: [prepare, verify]
    if: always()
    
    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.verify.result }}" == "success" ]; then
            echo "STATUS=✅ SUCCESS" >> "$GITHUB_OUTPUT"
            echo "COLOR=good" >> "$GITHUB_OUTPUT"
          else
            echo "STATUS=❌ FAILED" >> "$GITHUB_OUTPUT"
            echo "COLOR=danger" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack notification
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "Production Deployment ${{ steps.status.outputs.STATUS }}",
              "attachments": [{
                "color": "${{ steps.status.outputs.COLOR }}",
                "fields": [
                  {"title": "Commit", "value": "${{ needs.prepare.outputs.short_sha }}", "short": true},
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Actor", "value": "${{ github.actor }}", "short": true},
                  {"title": "Version", "value": "${{ needs.prepare.outputs.version }}", "short": true},
                  {"title": "PR", "value": "#${{ needs.prepare.outputs.pr_number }}", "short": true}
                ]
              }]
            }'
        continue-on-error: true
      
      - name: Log deployment to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            # Log deployment to system
            echo "$(date): Production deployment ${{ needs.verify.result }} - Version ${{ needs.prepare.outputs.version }}" >> ~/deployments/deployment.log
        continue-on-error: true

  # Job 10: Create GitHub release
  release:
    runs-on: ubuntu-24.04
    needs: [prepare, verify]
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          release_name: Production Release ${{ needs.prepare.outputs.version }}
          body: |
            Production deployment from PR #${{ needs.prepare.outputs.pr_number }}
            
            **Changes**: ${{ needs.prepare.outputs.pr_title }}
            **Deployed by**: @${{ github.actor }}
            **Commit**: ${{ github.sha }}
            **Short SHA**: ${{ needs.prepare.outputs.short_sha }}
            **Version**: ${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false