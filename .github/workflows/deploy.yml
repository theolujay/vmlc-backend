name: CI/CD pipeine

on:
  push:
    branches:
      - 'main'

jobs:
  run-tests-and-deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Extract metadata
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        
      - name: Build Docker image for tests
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: test
          tags: ${{ steps.meta.outputs.REPO_NAME }}-dev:${{ steps.meta.outputs.SHORT_SHA }}
          load: true # Load to local Docker daemon for testing
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
            
      - name: Run tests
        run: |
          docker network create test-network
          docker run -d --rm \
            -e POSTGRES_USER=testuser \
            -e POSTGRES_PASSWORD=testpassword \
            -e POSTGRES_DB=testdb \
            --network test-network \
            --name db \
            postgres:17.2-bookworm
          sleep 10
          docker run --rm \
            --network test-network \
            --entrypoint "" \
            ${{ steps.meta.outputs.REPO_NAME }}-dev:${{ steps.meta.outputs.SHORT_SHA }} \
            sh -c "python manage.py migrate --settings=config.settings.test --no-input && python manage.py test --settings=config.settings.test --noinput --keepdb --failfast"
          docker stop db
          docker network rm test-network
        timeout-minutes: 10

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Build and push Docker image to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.REPO_NAME }}:staging
            ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.REPO_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
          cache-from: type=local,src=/tmp/.buildx-cache

      - name: create env file
        run: |
          echo "GIT_COMMIT_HASH=${{ steps.meta.outputs.SHORT_SHA }}" >> ./envfile
      
      - name: Create/Update Docker Secrets
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Function to create or update a secret
            update_secret() {
              SECRET_NAME=$1
              SECRET_VALUE=$2
              
              # Check if secret exists
              if docker secret inspect $SECRET_NAME >/dev/null 2>&1; then
                echo "Secret $SECRET_NAME already exists, skipping..."
              else
                echo "Creating secret $SECRET_NAME..."
                echo "$SECRET_VALUE" | docker secret create $SECRET_NAME -
              fi
            }
            
            # Create/update all secrets (matching your docker-stack.yml naming)
            update_secret "aws-access-key-id" "${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}"
            update_secret "aws-secret-access-key" "${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}"
            update_secret "database-url" "${{ secrets.STAGING_DATABASE_URL }}"
            update_secret "django-admin-url" "${{ secrets.STAGING_DJANGO_ADMIN_URL }}"
            update_secret "django-secret-key" "${{ secrets.STAGING_SECRET_KEY }}"
            update_secret "gmail-host-password" "${{ secrets.STAGING_EMAIL_HOST_PASSWORD }}"
            update_secret "su-password" "${{ secrets.STAGING_SUPERUSER_PASSWORD }}"
            update_secret "db-password" "${{ secrets.STAGING_DB_PASSWORD }}"

      - name: Run pre-deploy migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "=========================================="
            echo "Starting pre-deploy migrations..."
            echo "Image: ghcr.io/verboheit/vmlc-backend:${{ steps.meta.outputs.SHORT_SHA }}"
            echo "=========================================="
            
            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the image explicitly to verify it exists
            echo "Pulling image..."
            docker pull ghcr.io/verboheit/vmlc-backend:${{ steps.meta.outputs.SHORT_SHA }}
            
            # Run migrations using Docker secrets (matching your stack config)
            echo "Running migrations..."
            docker run --rm \
              --secret aws-access-key-id \
              --secret aws-secret-access-key \
              --secret database-url \
              --secret django-admin-url \
              --secret gmail-host-password \
              --secret django-secret-key \
              --secret su-password \
              -e AWS_ACCESS_KEY_ID_FILE=/run/secrets/aws-access-key-id \
              -e AWS_SECRET_ACCESS_KEY_FILE=/run/secrets/aws-secret-access-key \
              -e DATABASE_URL_FILE=/run/secrets/database-url \
              -e DJANGO_ADMIN_URL_FILE=/run/secrets/django-admin-url \
              -e EMAIL_HOST_PASSWORD_FILE=/run/secrets/gmail-host-password \
              -e SECRET_KEY_FILE=/run/secrets/django-secret-key \
              -e SUPERUSER_PASSWORD_FILE=/run/secrets/su-password \
              -e DJANGO_SETTINGS_MODULE=config.settings.staging \
              --network staging \
              --entrypoint "" \
              ghcr.io/verboheit/vmlc-backend:${{ steps.meta.outputs.SHORT_SHA }} \
              ./scripts/runmigrations.sh
            MIGRATION_EXIT_CODE=$?
            echo "=========================================="
            echo "Migration exit code: $MIGRATION_EXIT_CODE"
            echo "=========================================="
            
            if [ $MIGRATION_EXIT_CODE -ne 0 ]; then
              echo "❌ Migrations failed!"
              exit 1
            fi
            
            echo "✅ Migrations completed successfully!"

      - name: Docker Stack Deploy
        uses: cssnr/stack-deploy-action@v1
        with:
          name: vmlc-backend
          file: docker-stack.yml
          host: ${{ secrets.VPS_HOST }}
          user: deploy
          ssh_key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          env_file: ./envfile
          