# include:
#   - compose.observability.yml

x-dev-otel-env: &dev-otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_SERVICE_NAME: ${COMPOSE_PROJECT_NAME}_dev
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=development
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.5"

x-dev-volumes: &dev-volumes
  - .:/home/verboheit/web
  - ./dev_data/staticfiles:/home/verboheit/web/staticfiles
  - ./dev_data/media:/home/verboheit/web/media

x-dev-security: &dev-security
  cap_drop: [ALL]
  cap_add: [CHOWN, SETGID, SETUID]
  security_opt: [no-new-privileges:true]

x-dev-base: &dev-base
  image: vmlc-backend:dev
  restart: unless-stopped
  env_file: .env
  volumes: *dev-volumes
  environment: *dev-otel-env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
    # otel-collector:
    #     condition: service_started
  networks:
    - dev


services:
  traefik:
    image: traefik:v3.5.3
    container_name: dev_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dev
    restart: unless-stopped

  web:
    <<: *dev-base
    container_name: dev_web
    command: >
      opentelemetry-instrument
      --traces_exporter otlp
      --metrics_exporter otlp
      ./scripts/runserver.sh
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 10 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`dev-api.verboheit.org`)"
      - "traefik.http.services.web.loadbalancer.server.port=8000"

  db:
    image: postgres:17.2-bookworm
    container_name: dev_db
    volumes:
      - ./dev_data/db:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
    env_file: .env
    networks:
      - dev

  redis:
    image: redis:7.2.4-alpine
    container_name: dev_redis
    volumes:
      - ./dev_data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "6379:6379"
    networks:
      - dev

  celery_worker:
    <<: *dev-base
    container_name: dev_celery_worker
    command: >
      opentelemetry-instrument
      --traces_exporter otlp
      --metrics_exporter otlp
      celery -A config worker -l info --events --concurrency=4 --hostname=dev-worker@%h -Q default,emails,comms,scoring,files,reports,cache
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    <<: *dev-base
    container_name: dev_celery_beat
    command: ["celery", "-A", "config", "beat", "-l", "INFO", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]

  flower:
    <<: *dev-base
    container_name: dev_flower
    command: ["celery", "-A", "config", "flower", "--address=0.0.0.0", "--port=5555"]
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/", "--max-time", "5"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  dev:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_dev