  #     - no-new-privileges:true

  db:
    image: postgres:17.2-bookworm
    volumes:
      - dev_db:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    env_file: .env
    networks:
      - dev

  redis:
    image: redis:7.2.4-alpine
    volumes:
      - dev_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dev
  migrate:
    <<: *app-base
    entrypoint: ""
    command: ["./scripts/runmigrations.sh"]
    depends_on:
      - db
      - redis
    deploy:
      mode: replicated-job
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
  web:
    <<: *app-base
    entrypoint: "./scripts/entrypoint.sh"
    command: python manage.py runserver 0.0.0.0:8000
    
      # - opentelemetry-instrument
      # - --traces_exporter
      # - otlp
      # - --metrics_exporter
      # - otlp
      # - --logs_exporter
      # - otlp
      # - ./scripts/runserver.sh
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - migrate
    environment:
      <<: *dev-otel-env
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.instance.id=web
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`dev-api.localhost`)"
      - "traefik.http.services.web.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 10 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.2'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  celery_worker:
    <<: *app-base
    entrypoint: "./scripts/entrypoint.sh"
    command:
      - celery
      - -A
      - config
      - worker
      - -l
      - warning
      - --concurrency=2
      - --max-tasks-per-child=100
      - --time-limit=300
      - -Q
      - default,emails,comms,scoring,files,reports,cache

      # - opentelemetry-instrument
      # - --traces_exporter
      # - otlp
      # - --metrics_exporter
      # - otlp
      # - --logs_exporter
      # - otlp
      # - celery
      # - -A
      # - config
      # - worker
      # - -l
      # - warning
      # - --concurrency=2
      # - --max-tasks-per-child=100
      # - --time-limit=300
      # - -Q
      # - default,emails,comms,scoring,files,reports,cache
    depends_on:
      - db
      - redis
      - migrate
    environment:
      <<: *dev-otel-env
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.instance.id=celery_worker
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.15'
        reservations:
          memory: 256M
          cpus: '0.075'


  celery_beat:
    <<: *app-base
    entrypoint: "./scripts/entrypoint.sh"
    command: 
      - celery
      - -A
      - config
      - beat
      - -l
      - warning
      - --scheduler
      - django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
      - migrate
    environment:
      <<: *dev-otel-env
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.05'
        reservations:
          memory: 50M
          cpus: '0.03'

