  dev_letsencrypt:
  dev_db:
  dev_redis:
  dev_media:
  dev_static:
  dev_loki:
  dev_tempo:
  dev_grafana:
  dev_prometheus:

networks:
  dev:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_dev