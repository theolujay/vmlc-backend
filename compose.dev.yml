# Docker Compose for Development Environment

x-dev-security: &dev-security
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID
  security_opt:
    - no-new-privileges:true

x-app-base: &app-base
  volumes:
    - dev_media:/home/verboheit/web/media
    - dev_static:/home/verboheit/web/staticfiles
  env_file: .env
  networks:
    - dev
  <<: *dev-security

x-dev-otel-env: &dev-otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_SERVICE_NAME: ${COMPOSE_PROJECT_NAME}_dev
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=development
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.5"

services:
  # watchtower:
  #   image: containrrr/watchtower
  #   command:
  #     - "--label-enable"
  #     - "--interval"
  #     - "30"
  #     - "--rolling-restart"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - ~/.docker/config.json:/config.json:ro
  #   environment:
  #     - DOCKER_CONFIG=/
  #   networks:
  #     - dev
  #   restart: unless-stopped

  traefik:
    image: traefik:v3.5.3
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${COMPOSE_PROJECT_NAME}_dev"
      - "--entrypoints.web.address=:80"
      - "--metrics.prometheus=false"
      - "--metrics.otlp=true"
      - "--metrics.otlp.http=true"
      - "--metrics.otlp.grpc=false"
      - "--metrics.otlp.http.endpoint=http://otel-collector:4318/v1/metrics"
      - "--metrics.otlp.serviceName=traefik"
      - "--metrics.otlp.addEntryPointsLabels=true"
      - "--metrics.otlp.addRoutersLabels=true"
      - "--metrics.otlp.addServicesLabels=true"
      - "--tracing=true"
      - "--tracing.serviceName=traefik"
      - "--tracing.sampleRate=0.05"
      - "--tracing.otlp.grpc=false"
      - "--tracing.otlp.http=true"
      - "--tracing.otlp.http.endpoint=http://otel-collector:4318/v1/traces"
      - "--log.level=INFO"
      - "--log.format=json"
      - "--accesslog=true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`dev-traefik.localhost`)"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:17.2-bookworm
    volumes:
      - dev_db:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    env_file: .env
    networks:
      - dev

  redis:
    image: redis:7.2.4-alpine
    volumes:
      - dev_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dev


  migrate:
    <<: *app-base
    pull_policy: always
    image: &vmlcImage vmlc-backend:dev
    build:
      context: .
      target: development
    entrypoint: ""
    command: ["./scripts/runmigrations.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: "no"
    deploy:
      mode: replicated-job
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
  web:
    <<: *app-base
    image: *vmlcImage
    entrypoint: ./scripts/entrypoint.sh
    command:
      - opentelemetry-instrument
      - --traces_exporter
      - otlp
      - --metrics_exporter
      - otlp
      - --logs_exporter
      - otlp
      - ./scripts/runserver.sh
    environment:
      <<: *dev-otel-env
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.instance.id=web
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
        restart: true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`dev-api.localhost`)"
      - "traefik.http.services.web.loadbalancer.server.port=8000"
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/v1/health/ --max-time 10 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s
    deploy:
      mode: replicated
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  celery_worker:
    <<: *app-base
    image: *vmlcImage
    entrypoint: ./scripts/entrypoint.sh
    command:
      - opentelemetry-instrument
      - --traces_exporter
      - otlp
      - --metrics_exporter
      - otlp
      - --logs_exporter
      - otlp
      - celery
      - -A
      - config
      - worker
      - -l
      - warning
      - --concurrency=2
      - --max-tasks-per-child=100
      - --time-limit=300
      - -Q
      - default,emails,comms,scoring,files,reports,cache
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      <<: *dev-otel-env
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.instance.id=celery_worker
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
        restart: true
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    <<: *app-base
    image: *vmlcImage
    entrypoint: ./scripts/entrypoint.sh
    command: ["celery", "-A", "config", "beat", "-l", "warning", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
        restart: true
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

# ======== O11Y ========
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./otel.yml:/etc/otel/config.yml:ro
    ports:
      - "4318:4318"
    networks:
      - dev
    restart: unless-stopped
    depends_on:
      - loki
      - prometheus
      - tempo

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--enable-feature=exemplar-storage'
      - '--enable-feature=native-histograms'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - dev_prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - dev
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml
      - dev_loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - dev
    restart: unless-stopped
    
  tempo:
    image: grafana/tempo:latest
    volumes:
      - ./tempo.yml:/etc/tempo/tempo-local.yaml:ro
      - dev_tempo:/tmp/tempo
    command: ["-config.file=/etc/tempo/tempo-local.yaml"]
    ports:
      - "3200:3200"
    networks:
      - dev
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`dev-ops.localhost`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    environment:
      - GF_SERVER_ROOT_URL=https://dev-ops.localhost:3000
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
      - GF_PLUGINS_DISABLE_INSTALLATION=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_UPDATE_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - dev_grafana:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - dev
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'

volumes:
  dev_letsencrypt:
  dev_db:
  dev_redis:
  dev_media:
  dev_static:
  dev_loki:
  dev_tempo:
  dev_grafana:
  dev_prometheus:

networks:
  dev:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_dev